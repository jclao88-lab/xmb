<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小店进存销管理系统</title>
  <style>
    :root {
      color-scheme: light;
      --shell: #2f4658;
      --shell-dark: #263949;
      --accent: #0a6ed1;
      --bg: #eef1f3;
      --tile: #ffffff;
      --line: #d8dde3;
      --text: #1d2b36;
      --muted: #6a7885;
      --good: #188038;
      --warn: #b45f06;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shellbar {
      height: 42px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 16px;
      background: var(--shell);
      color: #fff;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.18);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 24px;
      border-radius: 2px;
      background: #0a6ed1;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .shell-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .shell-spacer {
      flex: 1;
    }

    .shell-action {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: rgba(255, 255, 255, 0.84);
      cursor: pointer;
    }

    .shell-action:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .user-chip {
      display: none;
      align-items: center;
      gap: 8px;
      height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 4px;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      font-size: 13px;
    }

    body.is-authenticated .user-chip {
      display: inline-flex;
    }

    .tabs {
      height: 34px;
      display: flex;
      align-items: flex-end;
      gap: 20px;
      padding: 0 34px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      height: 34px;
      display: inline-flex;
      align-items: center;
      border-bottom: 3px solid transparent;
      color: #354a5f;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--accent);
      border-color: var(--accent);
    }

    .workspace {
      min-height: calc(100vh - 76px);
      padding: 22px 34px 48px;
    }

    .login-view {
      max-width: 980px;
      margin: 32px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: stretch;
    }

    .intro-panel,
    .login-panel {
      min-height: 338px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--tile);
      box-shadow: var(--shadow);
    }

    .intro-panel {
      padding: 28px;
      display: grid;
      align-content: end;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.94) 0%, rgba(255, 255, 255, 0.72) 56%, rgba(255, 255, 255, 0.38) 100%),
        url("assets/shop-background.png") center / cover no-repeat;
    }

    .intro-panel h1,
    .login-panel h2 {
      margin: 0;
      letter-spacing: 0;
    }

    .intro-panel h1 {
      max-width: 520px;
      font-size: 36px;
      line-height: 1.18;
    }

    .intro-panel p {
      max-width: 520px;
      margin: 14px 0 0;
      color: #475569;
      font-size: 15px;
      line-height: 1.7;
    }

    .login-panel {
      padding: 24px;
    }

    .login-panel h2 {
      font-size: 24px;
    }

    .hint {
      margin: 8px 0 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 15px;
    }

    label {
      color: #334155;
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      height: 38px;
      padding: 8px 10px;
      border: 1px solid #c8d2dc;
      border-radius: 2px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(10, 110, 209, 0.16);
    }

    .primary-btn {
      width: 100%;
      height: 40px;
      margin-top: 6px;
      border: 0;
      border-radius: 2px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }

    .primary-btn:hover {
      background: #085caf;
    }

    .launchpad {
      display: none;
    }

    .auth-status {
      display: none;
      min-height: 320px;
      place-items: center;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    body.auth-checking .auth-status {
      display: grid;
    }

    body.auth-checking .login-view,
    body.auth-checking .launchpad {
      display: none !important;
    }

    body.is-authenticated .login-view {
      display: none;
    }

    body.is-authenticated .launchpad {
      display: block;
    }

    .page-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 18px;
    }

    .page-heading h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .page-heading p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .role-badge {
      padding: 6px 10px;
      border: 1px solid #b7c7d6;
      border-radius: 4px;
      background: #fff;
      color: #2f4658;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .section {
      margin-bottom: 22px;
    }

    body.feature-open .section {
      display: none !important;
    }

    .section-title {
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      padding: 0 10px;
      border-left: 3px solid var(--accent);
      background: #fff;
      color: #285b86;
      font-size: 12px;
      font-weight: 800;
    }

    .section-title-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .section-toggle {
      flex: 0 0 auto;
      height: 20px;
      min-width: 58px;
      padding: 0 8px;
      border: 1px solid #c8d2dc;
      border-radius: 2px;
      background: #f8fafc;
      color: #285b86;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .section-toggle:hover {
      border-color: #9fb7cf;
      background: #eef6ff;
    }

    .section.is-collapsed .tiles {
      display: none;
    }

    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 8px;
      max-width: 980px;
    }

    .tile {
      min-height: 126px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: var(--tile);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: border-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
    }

    .tile:hover {
      border-color: #9fb7cf;
      box-shadow: 0 3px 10px rgba(15, 23, 42, 0.12);
      transform: translateY(-1px);
    }

    .tile h3 {
      margin: 0;
      min-height: 34px;
      color: #1f2937;
      font-size: 13px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .tile .sub {
      margin-top: 3px;
      min-height: 16px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .metric {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: 18px;
      color: #31475a;
    }

    .metric strong {
      font-size: 29px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .metric.due-today strong,
    .date-alert.due-today {
      background: #fff3bf;
      color: #7a4f00;
    }

    .metric.overdue strong,
    .date-alert.overdue {
      background: #ffd6d6;
      color: #9f1239;
    }

    .metric.due-today strong,
    .metric.overdue strong {
      display: inline-block;
      min-width: 38px;
      padding: 3px 6px;
      border-radius: 4px;
      text-align: center;
    }

    .date-alert {
      font-weight: 800;
    }

    .tile-icon {
      width: 20px;
      height: 20px;
      display: inline-grid;
      place-items: center;
      margin-top: 19px;
      border: 1px solid #94a3b8;
      border-radius: 2px;
      color: #475569;
      font-size: 13px;
      font-weight: 800;
    }

    .mini-table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
      font-size: 10px;
      color: #475569;
    }

    .mini-table td {
      padding: 2px 0;
      border-bottom: 1px solid #edf1f5;
    }

    .mini-table td:last-child {
      text-align: right;
      color: #1f2937;
    }

    .trend {
      margin-top: 8px;
      color: var(--good);
      font-size: 11px;
      font-weight: 700;
    }

    .warn {
      color: var(--warn);
    }

    .feature-workspace {
      margin-top: 0;
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: var(--shadow);
    }

    .feature-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .feature-title h2 {
      margin: 0;
      color: #1f2937;
      font-size: 18px;
      letter-spacing: 0;
    }

    .feature-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .feature-actions,
    .filter-row,
    .form-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tool-btn {
      min-height: 30px;
      padding: 0 12px;
      border: 1px solid #b7c7d6;
      border-radius: 3px;
      background: #fff;
      color: #1f2937;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .tool-btn.primary {
      border-color: #0a6ed1;
      background: #0a6ed1;
      color: #fff;
    }

    .tool-btn:disabled,
    .tool-btn.is-disabled {
      border-color: #d1d5db;
      background: #f3f4f6;
      color: #9ca3af;
      cursor: pointer;
    }

    .feature-body {
      padding: 14px;
    }

    .filter-row {
      margin-bottom: 12px;
    }

    .filter-row input,
    .form-grid input,
    .form-grid select {
      height: 32px;
      border: 1px solid #b7c7d6;
      border-radius: 2px;
      padding: 0 8px;
      background: #fff;
      color: #1f2937;
      font-size: 13px;
    }

    .form-grid .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding-top: 18px;
    }

    .form-grid .checkbox-field input {
      width: auto;
      height: auto;
      margin: 0;
    }

    .filter-row input {
      width: min(420px, 100%);
    }

    .status-line {
      min-height: 18px;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .data-table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
    }

    .data-table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      font-size: 12px;
    }

    .data-table th,
    .data-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #edf1f5;
      text-align: left;
      white-space: nowrap;
    }

    .data-table th {
      background: #f3f6f9;
      color: #34495e;
      font-weight: 800;
    }

    .data-table tr:hover td {
      background: #f8fbff;
    }

    .data-table tr:hover .date-alert.due-today {
      background: #fff3bf;
    }

    .data-table tr:hover .date-alert.overdue {
      background: #ffd6d6;
    }

    .row-actions {
      display: flex;
      gap: 6px;
    }

    .lookup-line {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 32px;
      gap: 0;
      align-items: end;
    }

    .lookup-line label {
      display: grid;
      gap: 5px;
    }

    .lookup-line label input,
    .lookup-line > input {
      width: 100%;
      height: 32px;
      border: 1px solid #b7c7d6;
      border-right: 0;
      border-radius: 2px 0 0 2px;
      padding: 0 8px;
      background: #fff;
      color: #1f2937;
      font-size: 13px;
    }

    .lookup-btn {
      width: 32px;
      min-width: 32px;
      height: 32px;
      min-height: 32px;
      padding: 0;
      border-radius: 0 2px 2px 0;
      background: #fff url("./store/f-F4.jpg") center / 18px 18px no-repeat;
      color: transparent;
      font-size: 0;
      line-height: 0;
      overflow: hidden;
    }

    .order-summary {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
      color: #1f2937;
      font-size: 14px;
      font-weight: 800;
    }

    .pos-checkout-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-top: 12px;
    }

    .pos-checkout-total {
      display: grid;
      justify-items: end;
      gap: 8px;
      color: #1f2937;
      font-size: 14px;
      font-weight: 800;
    }

    .form-panel {
      margin-bottom: 14px;
      padding: 12px;
      border: 1px solid #d8dde3;
      background: #fbfcfd;
    }

    .form-panel h3 {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: 0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 10px;
    }

    .form-grid label {
      display: grid;
      gap: 5px;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
    }

    .form-grid .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 22px;
    }

    .form-grid .checkbox-label input {
      width: 16px;
      height: 16px;
      margin: 0;
      padding: 0;
    }

    .logout-btn {
      display: none;
      height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
    }

    body.is-authenticated .logout-btn {
      display: inline-block;
    }

    @media (max-width: 760px) {
      .shellbar {
        gap: 10px;
        padding: 0 10px;
      }

      .tabs {
        overflow-x: auto;
        padding: 0 14px;
      }

      .workspace {
        padding: 16px 14px 34px;
      }

      .login-view {
        grid-template-columns: 1fr;
        margin: 10px auto;
      }

      .intro-panel {
        min-height: 220px;
        padding: 22px;
      }

      .intro-panel h1 {
        font-size: 28px;
      }

      .tiles {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tile {
        min-height: 118px;
      }

      .metric strong {
        font-size: 24px;
      }
    }

    @media (max-width: 430px) {
      .shell-title span {
        display: none;
      }

      .shell-action {
        display: none;
      }

      .user-chip {
        max-width: 118px;
        padding: 0 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .logout-btn {
        padding: 0 8px;
      }

      .page-heading {
        align-items: flex-start;
        flex-direction: column;
      }

      .tiles {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="auth-checking">
  <header class="shellbar">
    <div class="logo">XMB</div>
    <div class="shell-title">Home <span>小店进存销管理系统</span></div>
    <div class="shell-spacer"></div>
    <button class="shell-action" type="button" title="搜索">⌕</button>
    <button class="shell-action" type="button" title="通知">!</button>
    <div class="user-chip" id="userChip"></div>
    <button class="logout-btn" id="logoutBtn" type="button">退出</button>
  </header>

  <nav class="tabs" aria-label="主导航">
    <span class="tab active">My Home</span>
    <span class="tab">Sales Documents</span>
    <span class="tab">Master Data</span>
    <span class="tab">Services</span>
  </nav>

  <main class="workspace">
    <div class="auth-status" id="authStatus">正在检查登录状态...</div>

    <section class="login-view" aria-label="登录">
      <div class="intro-panel">
        <div>
          <h1 data-i18n="appTitle">小店进存销管理系统</h1>
          <p data-i18n="appIntro">统一管理商品、供应商、客户、采购、销售和库存。登录后系统会根据员工角色显示可用功能。</p>
        </div>
      </div>

      <form class="login-panel" id="loginForm" autocomplete="off">
        <h2 data-i18n="loginTitle">登录</h2>
        <p class="hint" data-i18n="loginPreviewHint">静态样板页面，可选择不同角色预览权限菜单。</p>

        <div class="field">
          <label for="languageSelect" data-i18n="languageLabel">语言</label>
          <select id="languageSelect" name="language">
            <option value="zh-CN">中文</option>
            <option value="en">English</option>
          </select>
        </div>

        <div class="field">
          <label for="account" data-i18n="accountLabel">账号(xmb.com)</label>
          <input id="account" name="account" autocomplete="off" />
        </div>

        <div class="field">
          <label for="password" data-i18n="passwordLabel">密码</label>
          <input id="password" name="password" type="password" autocomplete="new-password" />
        </div>

        <div class="field">
          <label for="role" data-i18n="previewRoleLabel">演示角色</label>
          <select id="role" name="role">
            <option value="owner">店主 owner</option>
            <option value="manager">店长 manager</option>
            <option value="cashier">收银员 cashier</option>
          </select>
        </div>

        <button class="primary-btn" type="submit" data-i18n="loginButton">登录</button>
        <p class="hint" data-i18n="loginAuthHint">接入 Supabase 后，这里会读取 public.users.role。</p>
      </form>
    </section>

    <section class="launchpad" aria-label="工作台">
      <div class="page-heading">
        <div>
          <h1>My Home</h1>
          <p id="welcomeText" data-i18n="welcomeBack">欢迎回来</p>
        </div>
        <div class="role-badge" id="roleBadge">角色</div>
      </div>

      <section class="section" data-section="overview">
        <div class="section-title">
          <span class="section-title-text" data-i18n="salesOverview">销售概览</span>
          <button class="section-toggle" type="button" data-section-toggle="overview"></button>
        </div>
        <div class="tiles" id="overviewTiles"></div>
      </section>

      <section class="section" data-section="daily">
        <div class="section-title">
          <span class="section-title-text" data-i18n="dailyOperations">日常操作</span>
          <button class="section-toggle" type="button" data-section-toggle="daily"></button>
        </div>
        <div class="tiles" id="dailyTiles"></div>
      </section>

      <section class="section" data-section="purchase">
        <div class="section-title">
          <span class="section-title-text" data-i18n="purchaseInventory">采购与库存</span>
          <button class="section-toggle" type="button" data-section-toggle="purchase"></button>
        </div>
        <div class="tiles" id="purchaseTiles"></div>
      </section>

      <section class="section" data-section="manage">
        <div class="section-title">
          <span class="section-title-text" data-i18n="managementFunctions">管理功能</span>
          <button class="section-toggle" type="button" data-section-toggle="manage"></button>
        </div>
        <div class="tiles" id="manageTiles"></div>
      </section>

      <section class="feature-workspace" id="featureWorkspace" hidden>
        <div class="feature-head">
          <div class="feature-title">
            <h2 id="featureTitle" data-i18n="businessFeature">业务功能</h2>
            <p id="featureSubtitle" data-i18n="chooseFeature">请选择功能。</p>

    function todayText() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function dueDateUrgency(dateText) {
      if (!dateText) return "";
      const value = String(dateText).slice(0, 10);
      const today = todayText();
      if (value < today) return "overdue";
      if (value === today) return "due-today";
      return "";
    }

    function countDuePurchaseOrderLines(rows) {
      return (rows || []).filter((row) => {
        const urgency = dueDateUrgency(row.received_date);
        return urgency === "overdue" || urgency === "due-today";
      }).length;
    }

    function countDueSalesOrderLines(rows) {
      return (rows || []).filter((row) => {
        const urgency = dueDateUrgency(row.shipped_date);
        return urgency === "overdue" || urgency === "due-today";
      }).length;
    }

    async function loadTodayPosOrderCount(client) {
      const today = todayText();
      const tomorrow = new Date(`${today}T00:00:00`);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const tomorrowText = tomorrow.toISOString().slice(0, 10);
      const { count, error } = await client
        .from("sales_orders")
        .select("id", { count: "exact", head: true })
        .eq("customer_id", posCustomerId)
        .gte("created_at", `${today}T00:00:00`)
        .lt("created_at", `${tomorrowText}T00:00:00`);
      if (error) throw error;
      return count || 0;
    }

    async function loadActiveSalesOrderCount(client) {
      const { data: ordersData, error: ordersError } = await client
        .from("sales_orders")
        .select("id,customer_id")
        .neq("status", "cancelled")
        .limit(10000);
      if (ordersError) throw ordersError;
      const orderIds = (ordersData || [])
        .filter((order) => order.customer_id !== posCustomerId)
        .map((order) => order.id)
        .filter(Boolean);
      if (!orderIds.length) return 0;

      const { data: itemsData, error: itemsError } = await client
        .from("sales_order_items")
        .select("sales_order_id")
        .in("sales_order_id", orderIds)
        .or("is_shipped_complete.eq.false,is_shipped_complete.is.null")
        .limit(10000);
      if (itemsError) throw itemsError;
      return new Set((itemsData || []).map((item) => item.sales_order_id).filter(Boolean)).size;
    }

    async function loadLowStockItemCount(client) {
      const { data: productsData, error: productsError } = await client
        .from("products")
        .select("id,min_stock,is_active")
        .eq("is_active", true)
        .limit(10000);
      if (productsError) throw productsError;
      const productIds = (productsData || []).map((product) => product.id).filter(Boolean);
      if (!productIds.length) return 0;

      const { data: inventoryData, error: inventoryError } = await client
        .from("inventory")
        .select("product_id,quantity")
        .in("product_id", productIds)
        .limit(10000);
      if (inventoryError) throw inventoryError;

      const stockByProduct = new Map((inventoryData || []).map((item) => [item.product_id, Number(item.quantity || 0)]));
      return (productsData || []).filter((product) => Number(stockByProduct.get(product.id) || 0) < Number(product.min_stock || 0)).length;
    }

    function isPurchaseRelationError(error) {

    }

    function purchaseItemSelect(details, includeCompleteField) {
      if (!details) return "id,received_date,purchase_orders!inner(status)";
      const completeField = includeCompleteField ? "is_received_complete," : "";
      return `id,purchase_order_id,product_id,quantity,received_quantity,unit_cost,line_amount,received_date,${completeField}created_at,products(id,sku,name,zh_name,unit),purchase_orders!inner(id,order_no,supplier_id,status,order_date,total_amount,note,created_by,created_at,updated_at)`;
    }

    function purchaseItemFallbackSelect(includeCompleteField) {
      const completeField = includeCompleteField ? "is_received_complete," : "";
      return `id,purchase_order_id,product_id,quantity,received_quantity,unit_cost,line_amount,received_date,${completeField}created_at,products(id,sku,name,zh_name,unit)`;
    }

    async function loadActivePurchaseItemRows(client, options = {}) {
      const details = Boolean(options.details);
      const limit = options.limit || (details ? 300 : 10000);
      const filterIncomplete = !Boolean(options.includeHistory);

      async function primaryQuery(includeCompleteField, includeCompleteFilter) {
        let query = client
          .from("purchase_order_items")
          .select(purchaseItemSelect(details, includeCompleteField))
          .neq("purchase_orders.status", "cancelled");

        if (includeCompleteFilter) {
          query = query.or("is_received_complete.eq.false,is_received_complete.is.null");
        }
        if (details) {
          query = query
            .order("received_date", { ascending: true, nullsFirst: false })
            .order("created_at", { ascending: true });
        }
        return query.limit(limit);
      }

      async function fallbackTwoStep(includeCompleteField, includeCompleteFilter) {
        const { data: ordersData, error: ordersError } = await client
          .from("purchase_orders")
          .select("id,order_no,supplier_id,status,order_date,total_amount,note,created_by,created_at,updated_at")
          .neq("status", "cancelled")
          .limit(1000);
        if (ordersError) throw ordersError;

        const orders = ordersData || [];
        const orderIds = orders.map((order) => order.id).filter(Boolean);
        if (!orderIds.length) return [];
        const ordersById = new Map(orders.map((order) => [order.id, order]));

        let query = client
          .from("purchase_order_items")
          .select(details ? purchaseItemFallbackSelect(includeCompleteField) : "id,purchase_order_id,received_date")
          .in("purchase_order_id", orderIds);
        if (includeCompleteFilter) {
          query = query.or("is_received_complete.eq.false,is_received_complete.is.null");
        }
        if (details) {
          query = query
            .order("received_date", { ascending: true, nullsFirst: false })
            .order("created_at", { ascending: true });
        }

        const { data: itemsData, error: itemsError } = await query.limit(limit);
        if (itemsError) {
          if (includeCompleteField && isMissingPurchaseCompleteError(itemsError)) {
            return fallbackTwoStep(false, false);
          }
          throw itemsError;
        }

        return (itemsData || []).map((item) => ({
          ...item,
          purchase_orders: ordersById.get(item.purchase_order_id) || {},
        }));
      }

      const primaryResult = await primaryQuery(true, filterIncomplete);
      if (!primaryResult.error) return primaryResult.data || [];

      if (isMissingPurchaseCompleteError(primaryResult.error)) {
        const noCompleteResult = await primaryQuery(false, false);
        if (!noCompleteResult.error) return noCompleteResult.data || [];
        if (!isPurchaseRelationError(noCompleteResult.error)) throw noCompleteResult.error;
        return fallbackTwoStep(false, false);
      }

      if (isPurchaseRelationError(primaryResult.error)) {
        return fallbackTwoStep(true, filterIncomplete);
      }

      throw primaryResult.error;
    }

    function tileHtml(tile) {

      const body = tile.table

        : metric
          ? `<div class="metric ${tile.warn ? "warn" : ""}"><strong>${metric}</strong><span>${localText(tile.unit) || ""}</span></div>`
          : `<div class="tile-icon">${tile.icon || "•"}</div>`;

      const dynamicTrendCount = tile.dynamicTrend ? Number(dashboardMetrics[tile.dynamicTrend] || 0) : 0;
      const dynamicTrend = dynamicTrendCount > 0
        ? {
            "zh-CN": `${dynamicTrendCount}项超时`,
            en: `${dynamicTrendCount} ${dynamicTrendCount === 1 ? "line" : "lines"} overdue`,
          }
        : null;
      const trendText = dynamicTrend || tile.trend;
      const trend = trendText ? `<div class="trend ${tile.warn || dynamicTrend ? "warn" : ""}">${localText(trendText)}</div>` : "";
      const dynamicSubCount = tile.dynamicSub ? Number(dashboardMetrics[tile.dynamicSub] || 0) : 0;
      const subText = dynamicSubCount > 0 && tile.dynamicSubText ? tile.dynamicSubText : tile.sub;

      return `
        <article class="tile" tabindex="0" data-action="${tile.action || ""}">
          <h3>${localText(tile.title)}</h3>
          <div class="sub">${localText(subText)}</div>
          ${body}
          ${trend}
        </article>
      `;
    }

    async function refreshDashboardMetrics() {
      if (!window.xmbSupabaseClient || !["owner", "manager", "cashier"].includes(activeRole)) return;
      const client = window.xmbSupabaseClient;
      try {
        const [rows, salesRows, todayPosOrderCount, activeSalesOrderCount, lowStockItemCount] = await Promise.all([
          loadActivePurchaseItemRows(client, { details: false, limit: 10000 }),
          loadActiveSalesOrderItemRows(client),
          loadTodayPosOrderCount(client),
          loadActiveSalesOrderCount(client),
          loadLowStockItemCount(client),
        ]);
        dashboardMetrics.todayPosOrderCount = todayPosOrderCount;
        dashboardMetrics.activeSalesOrderCount = salesRows.length;
        dashboardMetrics.activeSalesOrderDueLines = countDueSalesOrderLines(salesRows);
        dashboardMetrics.activePurchaseOrderLines = rows.length;
        dashboardMetrics.activePurchaseOrderDueLines = countDuePurchaseOrderLines(rows);
        dashboardMetrics.lowStockItemCount = lowStockItemCount;
        renderLaunchpad(activeRole, { refreshMetrics: false });
      } catch {
        dashboardMetrics.todayPosOrderCount = 0;
        dashboardMetrics.activeSalesOrderCount = 0;
        dashboardMetrics.activeSalesOrderDueLines = 0;
        dashboardMetrics.activePurchaseOrderLines = 0;
        dashboardMetrics.activePurchaseOrderDueLines = 0;

      async function confirmPosCheckout() {
        try {
          const validLines = posCheckoutLines
            .filter((line) => line.product_id && Number(line.quantity) > 0)
            .map((line, index) => ({
              ...line,
              line_no: index + 1,
              quantity: Number(line.quantity),
              unit_price: Number(line.unit_price || 0),
              line_amount: Number((Number(line.quantity || 0) * Number(line.unit_price || 0)).toFixed(2)),
            }));
          const hasIncompleteLine = posCheckoutLines.some((line) => line.product_id || line.sku || Number(line.quantity) > 0)
            && posCheckoutLines.some((line) => (line.product_id || line.sku || Number(line.quantity) > 0) && (!line.product_id || Number(line.quantity) <= 0));
          if (!validLines.length || hasIncompleteLine) throw new Error(t("salesOrderNeedProduct"));

          const quantityByProduct = new Map();
          validLines.forEach((line) => {
            quantityByProduct.set(line.product_id, (quantityByProduct.get(line.product_id) || 0) + Number(line.quantity || 0));
          });

          const client = getClient();
          const productIds = [...quantityByProduct.keys()];
          const { data: inventoryData, error: inventoryError } = await client
            .from("inventory")
            .select("product_id,quantity")
            .in("product_id", productIds);
          if (inventoryError) throw inventoryError;

          const inventoryByProduct = new Map((inventoryData || []).map((item) => [item.product_id, Number(item.quantity || 0)]));
          for (const [productId, requiredQuantity] of quantityByProduct.entries()) {
            const currentQuantity = inventoryByProduct.get(productId) || 0;
            if (currentQuantity < requiredQuantity) {
              const line = validLines.find((item) => item.product_id === productId) || {};
              throw new Error(t("posInsufficientStock", {
                sku: line.sku || productId,
                stock: money(currentQuantity),
                quantity: money(requiredQuantity),
              }));
            }
          }

          const { data: sessionData, error: sessionError } = await client.auth.getSession();
          if (sessionError) throw sessionError;
          const orderNo = await generateSalesOrderNo();
          const today = new Date().toISOString().slice(0, 10);
          const totalAmount = validLines.reduce((sum, line) => sum + Number(line.line_amount || 0), 0);
          const orderPayload = {
            order_no: orderNo,
            customer_id: "cccccccc-cccc-cccc-cccc-cccccc000003",
            status: "confirmed",
            order_date: today,
            subtotal_amount: Number(totalAmount.toFixed(2)),
            discount_amount: 0,
            total_amount: Number(totalAmount.toFixed(2)),
            payment_method: "现金",
            note: null,
            created_by: sessionData.session?.user?.id || null,
          };

          const { data: orderData, error: orderError } = await client
            .from("sales_orders")
            .insert(orderPayload)
            .select("id,order_no")
            .single();
          if (orderError) throw orderError;

          const savedLines = [];
          for (const line of validLines) {
            const itemPayload = {
              sales_order_id: orderData.id,
              product_id: line.product_id,
              quantity: line.quantity,
              shipped_quantity: line.quantity,
              is_shipped_complete: true,
              unit_price: line.unit_price,
              discount_amount: 0,
              line_amount: line.line_amount,
              shipped_date: today,
            };
            const { data: itemData, error: itemError } = await client
              .from("sales_order_items")
              .insert(itemPayload)
              .select("id")
              .single();
            if (itemError) throw itemError;
            savedLines.push({ ...line, item_id: itemData.id });
          }

          for (const [productId, requiredQuantity] of quantityByProduct.entries()) {
            const nextQuantity = Number(((inventoryByProduct.get(productId) || 0) - requiredQuantity).toFixed(3));
            const { error: updateError } = await client
              .from("inventory")
              .update({ quantity: nextQuantity, last_movement_at: new Date().toISOString() })
              .eq("product_id", productId);
            if (updateError) throw updateError;
            inventoryByProduct.set(productId, nextQuantity);
          }

          const movementQuantityByProduct = new Map((inventoryData || []).map((item) => [item.product_id, Number(item.quantity || 0)]));
          const movementRows = savedLines.map((line) => {
            const quantityAfter = Number(((movementQuantityByProduct.get(line.product_id) || 0) - Number(line.quantity || 0)).toFixed(3));
            movementQuantityByProduct.set(line.product_id, quantityAfter);
            return {
              product_id: line.product_id,
              movement_type: "603",
              quantity_change: -Number(line.quantity || 0),
              quantity_after: Number(quantityAfter.toFixed(3)),
              reference_type: "sales_order",
              reference_id: orderData.id,
              reference_item_id: line.item_id,
              reference_order_no: orderData.order_no,
              reference_line_no: line.line_no,
              note: null,
              created_by: sessionData.session?.user?.id || null,
            };
          });
          const { error: movementError } = await client.from("stock_movements").insert(movementRows);
          if (movementError) throw movementError;

          window.alert(t("posShipmentSaved"));
          posCheckoutLines = [blankPosCheckoutLine()];
          renderPosCheckoutRows();
          setFeatureMessage(t("posCheckoutReady"));
          refreshDashboardMetrics();
        } catch (error) {
          setFeatureMessage(error.message, true);
        }
      }

      async function increaseInventoryAndCreateMovements(client, lines, movementType, reference) {
        const productIds = [...new Set(lines.map((line) => line.product_id).filter(Boolean))];
        const { data: inventoryData, error: inventoryError } = await client
          .from("inventory")
          .select("product_id,quantity")
          .in("product_id", productIds);
        if (inventoryError) throw inventoryError;

        const inventoryByProduct = new Map((inventoryData || []).map((item) => [item.product_id, Number(item.quantity || 0)]));
        const movementQuantityByProduct = new Map(inventoryByProduct);
        const now = new Date().toISOString();
        const inventoryRows = [];
        const movementRows = lines.map((line) => {
          const nextQuantity = Number(((movementQuantityByProduct.get(line.product_id) || 0) + Number(line.quantity || 0)).toFixed(3));
          movementQuantityByProduct.set(line.product_id, nextQuantity);
          inventoryRows.push({ product_id: line.product_id, quantity: nextQuantity, last_movement_at: now });
          return {
            product_id: line.product_id,
            movement_type: movementType,
            quantity_change: Number(line.quantity || 0),
            quantity_after: nextQuantity,
            reference_type: "purchase_order",
            reference_id: reference.order_id,
            reference_item_id: line.item_id,
            reference_order_no: reference.order_no,
            reference_line_no: line.line_no,
            note: null,
            created_by: reference.created_by,
          };
        });

        const latestInventoryRows = [...new Map(inventoryRows.map((row) => [row.product_id, row])).values()];
        const { error: upsertError } = await client
          .from("inventory")
          .upsert(latestInventoryRows, { onConflict: "product_id" });
        if (upsertError) throw upsertError;

        const { error: movementError } = await client.from("stock_movements").insert(movementRows);
        if (movementError) throw movementError;
      }

      async function confirmDirectReceipt() {
        try {
          const validLines = receivingLines
            .filter((line) => line.product_id && Number(line.quantity) > 0)
            .map((line, index) => ({
              ...line,
              line_no: index + 1,
              quantity: Number(line.quantity),
              unit_cost: Number(line.unit_cost || 0),
              line_amount: Number((Number(line.quantity || 0) * Number(line.unit_cost || 0)).toFixed(2)),
            }));
          const hasIncompleteLine = receivingLines.some((line) => line.product_id || line.sku || Number(line.quantity) > 0)
            && receivingLines.some((line) => (line.product_id || line.sku || Number(line.quantity) > 0) && (!line.product_id || Number(line.quantity) <= 0));
          if (!validLines.length || hasIncompleteLine) throw new Error(t("receiptNeedProduct"));

          const client = getClient();
          const { data: sessionData, error: sessionError } = await client.auth.getSession();
          if (sessionError) throw sessionError;
          const orderNo = await generatePurchaseOrderNo();
          const today = todayText();
          const totalAmount = validLines.reduce((sum, line) => sum + Number(line.line_amount || 0), 0);
          const orderPayload = {
            order_no: orderNo,
            supplier_id: "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaa000000",
            status: "confirmed",
            order_date: today,
            total_amount: Number(totalAmount.toFixed(2)),
            note: null,
            created_by: sessionData.session?.user?.id || null,
          };

          const { data: orderData, error: orderError } = await client
            .from("purchase_orders")
            .insert(orderPayload)
            .select("id,order_no")
            .single();
          if (orderError) throw orderError;

          const savedLines = [];
          for (const line of validLines) {
            const itemPayload = {
              purchase_order_id: orderData.id,
              product_id: line.product_id,
              quantity: line.quantity,
              received_quantity: line.quantity,
              is_received_complete: true,
              unit_cost: line.unit_cost,
              line_amount: line.line_amount,
              received_date: today,
            };
            const { data: itemData, error: itemError } = await client
              .from("purchase_order_items")
              .insert(itemPayload)
              .select("id")
              .single();
            if (itemError) throw itemError;
            savedLines.push({ ...line, item_id: itemData.id });
          }

          await increaseInventoryAndCreateMovements(client, savedLines, "501", {
            order_id: orderData.id,
            order_no: orderData.order_no,
            created_by: sessionData.session?.user?.id || null,
          });

          window.alert(t("receiptSaved"));
          receivingLines = [blankReceivingLine()];
          renderReceivingRows();
          setFeatureMessage(t("receiptFunctionReady"));
          refreshDashboardMetrics();
        } catch (error) {
          setFeatureMessage(error.message, true);
        }
      }

      async function loadPendingReceiptOrders() {
        try {
          document.getElementById("receivingMainPanel").hidden = true;
          document.getElementById("receiptOrderPanel").hidden = false;
          setFeatureMessage(t("loadingPurchaseOrders"));

          const client = getClient();
          const items = await loadActivePurchaseItemRows(client, { details: true, includeHistory: false, limit: 500 });
          pendingReceiptRows = (items || [])
            .filter((item) => item.purchase_orders?.status === "confirmed")
            .map((item, index) => {
              const quantity = Number(item.quantity || 0);
              const receivedQuantity = Number(item.received_quantity || 0);
              return {
                id: item.id,
                purchase_order_id: item.purchase_order_id,
                order_no: item.purchase_orders?.order_no || "",
                supplier_id: item.purchase_orders?.supplier_id || "",
                product_id: item.product_id,
                product_sku: item.products?.sku || "",
                product_name: item.products?.zh_name || item.products?.name || "",
                unit: item.products?.unit || "",
                quantity,
                received_quantity: receivedQuantity,
                pending_quantity: Number(Math.max(0, quantity - receivedQuantity).toFixed(3)),
                receive_quantity: Number(Math.max(0, quantity - receivedQuantity).toFixed(3)),
                line_no: index + 1,
              };
            })
            .filter((row) => row.pending_quantity > 0);

          const supplierIds = [...new Set(pendingReceiptRows.map((row) => row.supplier_id).filter(Boolean))];
          const suppliersResult = supplierIds.length

          pendingReceiptRows = pendingReceiptRows.map((row) => {
            const supplier = suppliersById.get(row.supplier_id) || {};
            return { ...row, supplier_name: supplier.zh_name || supplier.name || row.supplier_id || "" };
          });

          renderPendingReceiptRows();
          setFeatureMessage(t("purchaseOrdersLoaded", { shown: pendingReceiptRows.length, total: pendingReceiptRows.length }));

      async function confirmPurchaseOrderReceipt(itemId) {
        try {
          const row = pendingReceiptRows.find((item) => item.id === itemId);
          if (!row) return;
          const receiptQuantity = Number(row.receive_quantity || 0);
          if (receiptQuantity <= 0 || receiptQuantity > Number(row.pending_quantity || 0)) {
            throw new Error(t("receiptQuantityTooLarge"));
          }

          const client = getClient();
          const { data: sessionData, error: sessionError } = await client.auth.getSession();
          if (sessionError) throw sessionError;
          const nextReceivedQuantity = Number((Number(row.received_quantity || 0) + receiptQuantity).toFixed(3));
          const isComplete = nextReceivedQuantity >= Number(row.quantity || 0);
          const today = todayText();
          const { error: updateError } = await client
            .from("purchase_order_items")
            .update({
              received_quantity: nextReceivedQuantity,
              is_received_complete: isComplete,
              received_date: today,
            })
            .eq("id", row.id);
          if (updateError) throw updateError;

          await increaseInventoryAndCreateMovements(client, [{
            product_id: row.product_id,
            quantity: receiptQuantity,
            item_id: row.id,
            line_no: row.line_no,
          }], "101", {
            order_id: row.purchase_order_id,
            order_no: row.order_no,
            created_by: sessionData.session?.user?.id || null,
          });

          row.received_quantity = nextReceivedQuantity;
          row.pending_quantity = Number(Math.max(0, Number(row.quantity || 0) - nextReceivedQuantity).toFixed(3));
          row.receive_quantity = row.pending_quantity;
          pendingReceiptRows = pendingReceiptRows.filter((item) => item.pending_quantity > 0);
          renderPendingReceiptRows();
          setFeatureMessage(t("receiptSaved"));
          refreshDashboardMetrics();
        } catch (error) {
          setFeatureMessage(error.message, true);
        }
      }

            .from("products")
            .select("id,sku,barcode,name,zh_name,category,specification,unit,cost_price,sale_price,min_stock,default_order_quantity,is_active")
            .order("sku", { ascending: true })
            .limit(200);

            query = query.or(`sku.ilike.%${keyword}%,barcode.ilike.%${keyword}%,name.ilike.%${keyword}%,zh_name.ilike.%${keyword}%`);

        featureActions.querySelector("[data-po-new]")?.addEventListener("click", async () => {
          if (!purchaseOrderRows.length) await loadPurchaseOrders();
          const draft = purchaseOrderRows.find((row) => row.status === "draft");
          if (draft) {
            await openPurchaseOrderDraft(draft.id);
            return;
          }
          renderPurchaseOrderForm();
          setFeatureMessage(t("purchaseOrderNoDraft"));
        });
        featureBody.querySelector("[data-po-search]").addEventListener("click", renderPurchaseOrderRows);
        featureBody.querySelector("[data-po-clear]").addEventListener("click", () => {
          featureBody.querySelectorAll("input, select").forEach((element) => {
            if (element.type === "checkbox") {
              element.checked = false;
            } else {
              element.value = "";
            }
          });
          renderPurchaseOrderRows();
        });
        featureBody.querySelectorAll("input, select").forEach((element) => {
          element.addEventListener("keydown", (event) => {
            if (event.key === "Enter") renderPurchaseOrderRows();
          });
        });
        document.getElementById("poIncludeHistoryFilter")?.addEventListener("change", loadPurchaseOrders);

        loadPurchaseOrders();
      }

      async function loadPurchaseOrders() {
        try {
          setFeatureMessage(t("loadingPurchaseOrders"));
          const client = getClient();
          const includeHistory = Boolean(document.getElementById("poIncludeHistoryFilter")?.checked);
          const sortedItems = await loadActivePurchaseItemRows(client, { details: true, limit: 300, includeHistory });
          const orders = sortedItems.map((item) => item.purchase_orders).filter(Boolean);
          const supplierIds = [...new Set(orders.map((row) => row.supplier_id).filter(Boolean))];
          const userIds = [...new Set(orders.map((row) => row.created_by).filter(Boolean))];
          const [suppliersResult, usersResult] = await Promise.all([
            supplierIds.length
              ? client.from("suppliers").select("id,name,zh_name").in("id", supplierIds)
              : Promise.resolve({ data: [], error: null }),
            userIds.length
              ? client.from("users").select("id,display_name,zh_display_name").in("id", userIds)
              : Promise.resolve({ data: [], error: null }),
          ]);

          const suppliersData = suppliersResult.error ? [] : suppliersResult.data || [];
          const usersData = usersResult.error ? [] : usersResult.data || [];

          const suppliersById = new Map(suppliersData.map((supplier) => [supplier.id, supplier]));
          const usersById = new Map(usersData.map((user) => [user.id, user]));
          const ordersById = new Map(orders.map((order) => [order.id, order]));
          const lineNoByOrder = new Map();
          const lineNoByItem = new Map();
          [...sortedItems].sort((a, b) => {
            const leftOrder = ordersById.get(a.purchase_order_id)?.order_no || "";
            const rightOrder = ordersById.get(b.purchase_order_id)?.order_no || "";
            return leftOrder.localeCompare(rightOrder) || String(a.created_at || "").localeCompare(String(b.created_at || "")) || String(a.id || "").localeCompare(String(b.id || ""));
          }).forEach((item) => {
            const currentLineNo = (lineNoByOrder.get(item.purchase_order_id) || 0) + 1;
            lineNoByOrder.set(item.purchase_order_id, currentLineNo);
            lineNoByItem.set(item.id, currentLineNo);
          });
          purchaseOrderRows = sortedItems.map((item) => {
            const order = item.purchase_orders || ordersById.get(item.purchase_order_id) || {};
            const supplier = suppliersById.get(order.supplier_id) || {};
            const creator = usersById.get(order.created_by) || {};
            return {
              ...order,
              sales_order_id: item.sales_order_id,
              item_id: item.id,
              product_id: item.product_id,
              line_no: lineNoByItem.get(item.id) || "",
              product_sku: item.products?.sku || "",
              product_name: item.products?.zh_name || item.products?.name || "",
              unit: item.products?.unit || "",
              quantity: Number(item.quantity || 0),
              received_quantity: Number(item.received_quantity || 0),
              unit_cost: Number(item.unit_cost || 0),
              line_amount: Number(item.line_amount || 0),
              received_date: item.received_date || "",
              is_received_complete: item.is_received_complete === true,
              supplier_no: order.supplier_id || "",
              supplier_name: supplier.zh_name || supplier.name || order.supplier_id || "",
              creator_name: personNameByLanguage(creator, order.created_by || ""),
            };
          }).sort((a, b) => (a.received_date || "9999-12-31").localeCompare(b.received_date || "9999-12-31") || (a.order_no || "").localeCompare(b.order_no || "") || Number(a.line_no || 0) - Number(b.line_no || 0));

          updatePurchaseOrderFilterOptions();
          renderPurchaseOrderRows();
        } catch (error) {
          setFeatureMessage(error.message, true);
          const tbody = document.getElementById("purchaseOrderTableBody");
          if (tbody) tbody.innerHTML = `<tr><td colspan="${activeRole !== "cashier" ? 16 : 14}">${escapeHtml(error.message)}</td></tr>`;
        }
      }

      function renderDatalistOptions(elementId, values) {
        const datalist = document.getElementById(elementId);
        if (!datalist) return;
        datalist.innerHTML = [...new Set(values.filter(Boolean))]
          .sort((a, b) => String(a).localeCompare(String(b)))
          .map((value) => `<option value="${escapeHtml(value)}"></option>`)
          .join("");
      }

      function updatePurchaseOrderFilterOptions() {
        renderDatalistOptions("poNoFilterOptions", purchaseOrderRows.map((row) => row.order_no));
        renderDatalistOptions("poSupplierFilterOptions", purchaseOrderRows.map((row) => row.supplier_name));
        renderDatalistOptions("poProductFilterOptions", purchaseOrderRows.map((row) => row.product_sku));
      }

      function renderPurchaseOrderRows() {
        const tbody = document.getElementById("purchaseOrderTableBody");
        if (!tbody) return;

        const filters = {
          orderNo: document.getElementById("poNoFilter")?.value || "",
          supplier: document.getElementById("poSupplierFilter")?.value || "",
          product: document.getElementById("poProductFilter")?.value || "",
          status: document.getElementById("poStatusFilter")?.value || "",
          receivedFrom: document.getElementById("poReceivedFromFilter")?.value || "",
          receivedTo: document.getElementById("poReceivedToFilter")?.value || "",
          createdFrom: document.getElementById("poCreatedFromFilter")?.value || "",
          createdTo: document.getElementById("poCreatedToFilter")?.value || "",
        };

        const filtered = purchaseOrderRows.filter((row) => {
          if (!includesText(row.order_no, filters.orderNo)) return false;
          if (!includesText(row.supplier_name, filters.supplier)) return false;
          if (!includesText(row.product_sku, filters.product)) return false;
          if (filters.status && row.status !== filters.status) return false;
          if (filters.receivedFrom && row.received_date < filters.receivedFrom) return false;
          if (filters.receivedTo && row.received_date > filters.receivedTo) return false;
          const createdDate = String(row.created_at || "").slice(0, 10);
          if (filters.createdFrom && createdDate < filters.createdFrom) return false;
          if (filters.createdTo && createdDate > filters.createdTo) return false;
          return true;
        });

        tbody.innerHTML = filtered.map((row) => {
          const receivedDateClass = row.is_received_complete === true ? "" : dueDateUrgency(row.received_date);
          return `
          <tr>
            <td class="date-alert ${receivedDateClass}">${escapeHtml(row.received_date)}</td>
            <td>${escapeHtml(row.order_no)}</td>
            <td>${escapeHtml(row.line_no)}</td>
            <td>${escapeHtml(row.supplier_name)}</td>
            <td>${escapeHtml(row.product_sku)}</td>
            <td>${escapeHtml(row.product_name)}</td>
            <td>${escapeHtml(purchaseStatusLabel(row.status))}</td>
            <td>${escapeHtml(row.order_date)}</td>
            <td>${escapeHtml(row.quantity)}</td>
            <td>${escapeHtml(row.received_quantity)}</td>
            ${activeRole !== "cashier" ? `<td>${money(row.unit_cost)}</td><td>${money(row.line_amount)}</td>` : ""}
            <td>${escapeHtml(booleanLabel(row.is_received_complete))}</td>
            <td>${escapeHtml(row.creator_name)}</td>
            <td>${escapeHtml(row.note)}</td>
            <td>
              <div class="row-actions">
                <button class="tool-btn" type="button" data-po-display="${row.id}">${t("display")}</button>
                <button class="tool-btn" type="button" data-po-receive="${row.item_id}">${t("receive")}</button>
              </div>
            </td>
          </tr>
        `;
        }).join("");

        tbody.querySelectorAll("[data-po-display]").forEach((button) => {
          button.addEventListener("click", () => openPurchaseOrderDraft(button.dataset.poDisplay, { readonly: true }));
        });
        tbody.querySelectorAll("[data-po-receive]").forEach((button) => {
          button.addEventListener("click", () => {
            openFeature("receiving");
            loadPendingReceiptOrders();
          });
        });

        setFeatureMessage(t("purchaseOrdersLoaded", { shown: filtered.length, total: purchaseOrderRows.length }));
      }

      function blankPurchaseOrderLine() {
        return { product_id: "", sku: "", name: "", zh_name: "", unit: "pcs", quantity: 1, unit_cost: 0, line_amount: 0, received_date: "" };
      }

      function renderPurchaseOrderForm(order = null, options = {}) {
        purchaseOrderFormReadonly = Boolean(options.readonly);
        const canModifyPurchaseOrder = purchaseOrderFormReadonly && ["owner", "manager"].includes(activeRole);
        const fieldState = purchaseOrderFormReadonly ? "disabled" : "";
        const hasExistingPurchaseOrder = Boolean(order?.id);
        currentPurchaseOrder = order ? { ...order } : null;
        purchaseOrderLines = order?.lines?.length ? order.lines.map((line) => ({ ...line })) : [blankPurchaseOrderLine()];
        const formTitle = purchaseOrderFormReadonly
          ? t("purchaseOrderDisplayTitle")
          : order
            ? t("purchaseOrderEditTitle")
            : t("purchaseOrderFormTitle");
        featureTitle.textContent = formTitle;
        featureSubtitle.textContent = t("purchaseOrderSub");
        featureActions.innerHTML = `
          <button class="tool-btn" type="button" data-po-back-list>${t("backToLaunchpad")}</button>
          ${canModifyPurchaseOrder ? `<button class="tool-btn primary" type="button" data-po-modify>${t("modify")}</button>` : ""}
          ${!purchaseOrderFormReadonly ? `${hasExistingPurchaseOrder ? `<button class="tool-btn" type="button" data-po-cancel-edit>${t("cancel")}</button>` : `<button class="tool-btn" type="button" data-po-draft>${t("temporarySave")}</button>`}
          <button class="tool-btn primary" type="button" data-po-confirm>${t("confirmSave")}</button>` : ""}
        `;
        featureBody.innerHTML = `
          <div class="form-panel">
            <h3>${formTitle}</h3>
            <div class="form-grid">
              <label>${t("purchaseOrderNo")}<input id="poFormNo" value="${escapeHtml(order?.order_no || "")}" readonly></label>
              <label>${t("orderDate")}<input id="poFormDate" type="date" value="${escapeHtml(order?.order_date || new Date().toISOString().slice(0, 10))}" ${fieldState}></label>
              <label>${t("status")}<input value="${escapeHtml(purchaseStatusLabel(order?.status || "draft"))}" readonly></label>
              <label>${t("note")}<input id="poFormNote" value="${escapeHtml(order?.note || "")}" ${fieldState}></label>
            </div>
            <div class="lookup-line" style="margin-top: 10px;">
              <label>${t("supplier")}<input id="poSupplierLookup" list="poSupplierOptions" value="${escapeHtml(order?.supplier_name || "")}" ${fieldState}></label>
              <button class="tool-btn lookup-btn" type="button" data-po-supplier-lookup title="${t("lookup")}" aria-label="${t("lookup")}" ${purchaseOrderFormReadonly ? "disabled" : ""}>${t("lookup")}</button>
              <datalist id="poSupplierOptions"></datalist>
            </div>
            <input id="poSupplierId" type="hidden" value="${escapeHtml(order?.supplier_id || "")}">
          </div>
          <div class="data-table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>${t("productCode")}</th>
                  <th>${t("productName")}</th>
                  <th>${t("unit")}</th>
                  <th>${t("quantity")}</th>
                  <th>${t("receivedDate")}</th>
                  ${activeRole !== "cashier" ? `<th>${t("unitCost")}</th><th>${t("lineAmount")}</th>` : ""}
                  <th>${t("actions")}</th>
                </tr>
              </thead>
              <tbody id="poLineTableBody"></tbody>
            </table>
          </div>
          <div class="form-actions" style="margin-top: 12px;" ${purchaseOrderFormReadonly ? "hidden" : ""}>
            <button class="tool-btn" type="button" data-po-add-line>${t("addLine")}</button>
          </div>
          ${activeRole !== "cashier" ? `<div class="order-summary">${t("totalAmount")}: <span id="poFormTotal">0.00</span></div>` : ""}
          <p class="status-line" id="featureStatus">${t("purchaseOrderFormReady")}</p>
        `;

        renderPurchaseOrderLineRows();
        featureActions.querySelector("[data-po-back-list]").addEventListener("click", renderPurchaseOrdersFeature);
        featureActions.querySelector("[data-po-modify]")?.addEventListener("click", () => renderPurchaseOrderForm(currentPurchaseOrder, { readonly: false }));
        featureActions.querySelector("[data-po-cancel-edit]")?.addEventListener("click", () => renderPurchaseOrderForm(currentPurchaseOrder, { readonly: true }));
        featureActions.querySelector("[data-po-draft]")?.addEventListener("click", () => savePurchaseOrder("draft"));
        featureActions.querySelector("[data-po-confirm]")?.addEventListener("click", () => savePurchaseOrder("confirmed"));
        featureBody.querySelector("[data-po-supplier-lookup]")?.addEventListener("click", lookupPurchaseSupplier);
        featureBody.querySelector("#poSupplierLookup")?.addEventListener("change", applySupplierLookupValue);
        featureBody.querySelector("[data-po-add-line]")?.addEventListener("click", () => {
          purchaseOrderLines.push(blankPurchaseOrderLine());
          renderPurchaseOrderLineRows();
        });
      }

      function renderPurchaseOrderLineRows() {
        const tbody = document.getElementById("poLineTableBody");
        if (!tbody) return;
        tbody.innerHTML = purchaseOrderLines.map((line, index) => {
          const lineAmount = Number(line.quantity || 0) * Number(line.unit_cost || 0);
          line.line_amount = Number(lineAmount.toFixed(2));
          const lineReadonly = purchaseOrderFormReadonly || line.is_received_complete === true;
          const productCell = lineReadonly
            ? escapeHtml(line.sku)
            : `<div class="lookup-line">
                  <input data-po-line-sku="${index}" list="poProductOptions${index}" value="${escapeHtml(line.sku)}">
                  <button class="tool-btn lookup-btn" type="button" data-po-product-lookup="${index}" title="${t("lookup")}" aria-label="${t("lookup")}">${t("lookup")}</button>
                  <datalist id="poProductOptions${index}"></datalist>
                </div>`;
          return `
            <tr data-po-line="${index}">
              <td>${productCell}</td>
              <td>${escapeHtml(line.zh_name || line.name)}</td>
              <td>${escapeHtml(line.unit)}</td>
              <td>${lineReadonly ? escapeHtml(line.quantity) : `<input data-po-line-qty="${index}" type="number" min="0.001" step="0.001" value="${escapeHtml(line.quantity)}">`}</td>
              <td>${lineReadonly ? escapeHtml(line.received_date || "") : `<input data-po-line-received-date="${index}" type="date" value="${escapeHtml(line.received_date || "")}" required>`}</td>
              ${activeRole !== "cashier" ? `<td>${lineReadonly ? money(line.unit_cost) : `<input data-po-line-cost="${index}" type="number" min="0" step="0.01" value="${escapeHtml(line.unit_cost)}">`}</td><td>${money(line.line_amount)}</td>` : ""}
              <td>${lineReadonly ? "" : `<button class="tool-btn" type="button" data-po-remove-line="${index}">${t("remove")}</button>`}</td>
            </tr>
          `;
        }).join("");

        tbody.querySelectorAll("[data-po-product-lookup]").forEach((button) => {
          button.addEventListener("click", () => lookupPurchaseProduct(Number(button.dataset.poProductLookup)));
        });
        tbody.querySelectorAll("[data-po-line-sku]").forEach((input) => {
          input.addEventListener("change", () => applyProductLookupValue(Number(input.dataset.poLineSku)));
        });
        tbody.querySelectorAll("[data-po-line-qty]").forEach((input) => {
          input.addEventListener("input", () => updatePurchaseLineNumber(Number(input.dataset.poLineQty), "quantity", input.value));
        });
        tbody.querySelectorAll("[data-po-line-cost]").forEach((input) => {
          input.addEventListener("input", () => updatePurchaseLineNumber(Number(input.dataset.poLineCost), "unit_cost", input.value));
        });
        tbody.querySelectorAll("[data-po-line-received-date]").forEach((input) => {
          input.addEventListener("input", () => {
            purchaseOrderLines[Number(input.dataset.poLineReceivedDate)].received_date = input.value;
          });
        });
        tbody.querySelectorAll("[data-po-remove-line]").forEach((button) => {
          button.addEventListener("click", () => {
            purchaseOrderLines.splice(Number(button.dataset.poRemoveLine), 1);
            if (!purchaseOrderLines.length) purchaseOrderLines.push(blankPurchaseOrderLine());
            renderPurchaseOrderLineRows();
          });
        });
        updatePurchaseOrderTotal();
      }

      function updatePurchaseLineNumber(index, field, value) {
        purchaseOrderLines[index][field] = Number(value || 0);
        renderPurchaseOrderLineRows();
      }

      function updatePurchaseOrderTotal() {
        const total = purchaseOrderLines.reduce((sum, line) => sum + Number(line.line_amount || 0), 0);
        const totalElement = document.getElementById("poFormTotal");
        if (totalElement) totalElement.textContent = money(total);
        return Number(total.toFixed(2));
      }

      function setSupplierOptions(items) {
        const datalist = document.getElementById("poSupplierOptions");
        if (!datalist) return;
        datalist.innerHTML = items.map((item) => `<option value="${escapeHtml(item.zh_name || item.name)}" data-id="${escapeHtml(item.id)}">${escapeHtml(item.name || item.zh_name)}</option>`).join("");
      }

      async function lookupPurchaseSupplier() {
        const input = document.getElementById("poSupplierLookup");
        const term = input.value.trim();
        const query = getClient()
          .from("suppliers")
          .select("id,name,zh_name,phone,is_active")
          .eq("is_active", true)
          .limit(20);
        const result = term
          ? await query.or(`name.ilike.%${term}%,zh_name.ilike.%${term}%,phone.ilike.%${term}%`)
          : await query;
        if (result.error) {
          setFeatureMessage(result.error.message, true);
          return;
        }
        if (!result.data?.length) {
          setFeatureMessage(t("purchaseOrderNoSupplier"), true);
          return;
        }
        setSupplierOptions(result.data);
        if (result.data.length === 1) {
          const supplier = result.data[0];
          document.getElementById("poSupplierId").value = supplier.id;
          input.value = supplier.zh_name || supplier.name;
          setFeatureMessage(t("purchaseOrderSupplierSelected"));
        }
      }

      function applySupplierLookupValue() {
        const input = document.getElementById("poSupplierLookup");
        const option = [...document.getElementById("poSupplierOptions").options].find((item) => item.value === input.value);
        if (option) document.getElementById("poSupplierId").value = option.dataset.id || "";
      }

      function setProductOptions(index, items) {
        const datalist = document.getElementById(`poProductOptions${index}`);
        if (!datalist) return;
        datalist.innerHTML = items.map((item) => `<option value="${escapeHtml(item.sku)}">${escapeHtml(item.zh_name || item.name || item.barcode || "")}</option>`).join("");
      }

      async function lookupPurchaseProduct(index) {
        const input = document.querySelector(`[data-po-line-sku="${index}"]`);
        const term = input.value.trim();
        const query = getClient()
          .from("products")
          .select("id,sku,barcode,name,zh_name,unit,cost_price,is_active")
          .eq("is_active", true)
          .limit(20);
        const result = term
          ? await query.or(`sku.ilike.%${term}%,barcode.ilike.%${term}%,name.ilike.%${term}%,zh_name.ilike.%${term}%`)
          : await query;
        if (result.error) {
          setFeatureMessage(result.error.message, true);
          return;
        }
        if (!result.data?.length) {
          setFeatureMessage(t("purchaseOrderNoProduct"), true);
          return;
        }
        setProductOptions(index, result.data);
        const exact = result.data.find((item) => item.sku === term || item.barcode === term) || (result.data.length === 1 ? result.data[0] : null);
        if (exact) selectPurchaseProduct(index, exact);
      }

      async function applyProductLookupValue(index) {
        const sku = document.querySelector(`[data-po-line-sku="${index}"]`)?.value.trim();
        if (!sku) return;
        const { data, error } = await getClient()
          .from("products")
          .select("id,sku,barcode,name,zh_name,unit,cost_price,is_active")
          .eq("sku", sku)
          .maybeSingle();
        if (error) {
          setFeatureMessage(error.message, true);
          return;
        }
        if (data) selectPurchaseProduct(index, data);
      }

      function selectPurchaseProduct(index, product) {
        purchaseOrderLines[index] = {
          ...purchaseOrderLines[index],
          product_id: product.id,
          sku: product.sku,
          name: product.name || "",
          zh_name: product.zh_name || "",
          unit: product.unit || "pcs",
          unit_cost: Number(product.cost_price || 0),
        };
        purchaseOrderLines[index].line_amount = Number((Number(purchaseOrderLines[index].quantity || 0) * Number(purchaseOrderLines[index].unit_cost || 0)).toFixed(2));
        setFeatureMessage(t("purchaseOrderProductSelected"));
        renderPurchaseOrderLineRows();
      }

      async function generatePurchaseOrderNo() {
        const today = new Date().toISOString().slice(0, 10).replaceAll("-", "");
        const prefix = `PO${today}`;
        const { data, error } = await getClient()
          .from("purchase_orders")
          .select("order_no")
          .ilike("order_no", `${prefix}%`)
          .order("order_no", { ascending: false })
          .limit(1);
        if (error) throw error;
        const lastNo = data?.[0]?.order_no || "";
        const lastSeq = Number(lastNo.slice(prefix.length)) || 0;
        return `${prefix}${String(lastSeq + 1).padStart(3, "0")}`;
      }

      async function savePurchaseOrder(status) {
        try {
          applySupplierLookupValue();
          const supplierId = document.getElementById("poSupplierId").value;
          if (!supplierId) throw new Error(t("purchaseOrderNeedSupplier"));
          const validLines = purchaseOrderLines
            .filter((line) => line.product_id && Number(line.quantity) > 0 && line.received_date)
            .map((line) => ({
              product_id: line.product_id,
              quantity: Number(line.quantity),
              received_quantity: Number(line.received_quantity || 0),
              is_received_complete: line.is_received_complete === true,
              unit_cost: Number(line.unit_cost || 0),
              line_amount: Number((Number(line.quantity || 0) * Number(line.unit_cost || 0)).toFixed(2)),
              received_date: line.received_date,
            }));
          const hasIncompleteLine = purchaseOrderLines.some((line) => line.product_id || Number(line.quantity) > 0 || line.received_date)
            && purchaseOrderLines.some((line) => !line.product_id || Number(line.quantity) <= 0 || !line.received_date);
          if (!validLines.length || hasIncompleteLine) throw new Error(t("purchaseOrderNeedProduct"));
          if (status === "confirmed" && !window.confirm(t("purchaseOrderConfirmSave"))) return;

          const client = getClient();
          const { data: sessionData, error: sessionError } = await client.auth.getSession();
          if (sessionError) throw sessionError;
          const orderNo = currentPurchaseOrder?.order_no || await generatePurchaseOrderNo();
          const totalAmount = validLines.reduce((sum, line) => sum + line.line_amount, 0);
          const payload = {
            order_no: orderNo,
            supplier_id: supplierId,
            status,
            order_date: document.getElementById("poFormDate").value || new Date().toISOString().slice(0, 10),
            total_amount: Number(totalAmount.toFixed(2)),
            note: document.getElementById("poFormNote").value.trim() || null,
            created_by: currentPurchaseOrder?.created_by || sessionData.session?.user?.id || null,
          };

          let orderId = currentPurchaseOrder?.id;
          if (orderId) {
            const { error } = await client.from("purchase_orders").update(payload).eq("id", orderId);
            if (error) throw error;
            const deleteResult = await client.from("purchase_order_items").delete().eq("purchase_order_id", orderId);
            if (deleteResult.error) throw deleteResult.error;
          } else {
            const { data, error } = await client.from("purchase_orders").insert(payload).select("id,order_no").single();
            if (error) throw error;
            orderId = data.id;
            payload.order_no = data.order_no;
          }

          const insertResult = await client.from("purchase_order_items").insert(validLines.map((line) => ({ ...line, purchase_order_id: orderId })));
          if (insertResult.error) throw insertResult.error;
          currentPurchaseOrder = { id: orderId, ...payload };
          document.getElementById("poFormNo").value = payload.order_no;
          setFeatureMessage(status === "draft" ? t("purchaseOrderSavedDraft") : t("purchaseOrderSavedConfirmed"));
          await loadPurchaseOrders();
          if (status === "draft") setFeatureMessage(t("purchaseOrderSavedDraft"));
          if (status === "confirmed") renderPurchaseOrdersFeature();
        } catch (error) {

      async function loadSalesOrders() {
        try {
          setFeatureMessage(t("loadingSalesOrders"));
          const client = getClient();
          const includeComplete = document.getElementById("soIncludeHistoryFilter")?.checked || false;
          const { data, error } = await client
            .from("sales_orders")
            .select("id,order_no,customer_id,status,order_date,subtotal_amount,discount_amount,total_amount,payment_method,note,created_by,created_at,updated_at")
            .neq("customer_id", posCustomerId)
            .order("order_date", { ascending: false })
            .order("order_no", { ascending: false })
            .limit(300);

          if (error) throw error;

          const orders = data || [];
          const customerIds = [...new Set(orders.map((row) => row.customer_id).filter(Boolean))];
          const userIds = [...new Set(orders.map((row) => row.created_by).filter(Boolean))];
          const orderIds = orders.map((row) => row.id).filter(Boolean);
          const [customersResult, usersResult, itemsResult] = await Promise.all([
            customerIds.length
              ? client.from("customers").select("id,name,zh_name").in("id", customerIds)
              : Promise.resolve({ data: [], error: null }),
            userIds.length
              ? client.from("users").select("id,display_name,zh_display_name").in("id", userIds)
              : Promise.resolve({ data: [], error: null }),
            orderIds.length
              ? client
                  .from("sales_order_items")
                  .select("id,sales_order_id,product_id,quantity,shipped_quantity,is_shipped_complete,unit_price,discount_amount,line_amount,shipped_date,created_at,products(id,sku,name,zh_name,unit)")
                  .in("sales_order_id", orderIds)
              : Promise.resolve({ data: [], error: null }),
          ]);

          if (customersResult.error) throw customersResult.error;
          if (usersResult.error) throw usersResult.error;
          if (itemsResult.error) throw itemsResult.error;

          const customersById = new Map((customersResult.data || []).map((customer) => [customer.id, customer]));
          const usersById = new Map((usersResult.data || []).map((user) => [user.id, user]));
          const ordersById = new Map(orders.map((order) => [order.id, order]));
          const lineNoByOrder = new Map();
          const lineNoByItem = new Map();
          [...(itemsResult.data || [])].sort((a, b) => {
            const leftOrder = ordersById.get(a.sales_order_id)?.order_no || "";
            const rightOrder = ordersById.get(b.sales_order_id)?.order_no || "";
            return leftOrder.localeCompare(rightOrder) || String(a.created_at || "").localeCompare(String(b.created_at || "")) || String(a.id || "").localeCompare(String(b.id || ""));
          }).forEach((item) => {
            const currentLineNo = (lineNoByOrder.get(item.sales_order_id) || 0) + 1;
            lineNoByOrder.set(item.sales_order_id, currentLineNo);
            lineNoByItem.set(item.id, currentLineNo);
          });
          salesOrderRows = (itemsResult.data || []).filter((item) => includeComplete || item.is_shipped_complete !== true).map((item) => {
            const order = ordersById.get(item.sales_order_id) || {};
            const customer = customersById.get(order.customer_id) || {};
            const creator = usersById.get(order.created_by) || {};
            return {
              ...order,
              sales_order_id: item.sales_order_id,
              item_id: item.id,
              product_id: item.product_id,
              line_no: lineNoByItem.get(item.id) || "",
              product_sku: item.products?.sku || "",
              product_name: item.products?.zh_name || item.products?.name || "",
              order_date_text: movementDate(order.order_date),
              shipped_date: item.shipped_date || "",
              quantity: Number(item.quantity || 0),
              shipped_quantity: Number(item.shipped_quantity || 0),
              is_shipped_complete: item.is_shipped_complete === true,
              unit_price: Number(item.unit_price || 0),
              line_amount: Number(item.line_amount || 0),
              customer_name: customer.zh_name || customer.name || order.customer_id || "",
              creator_name: creator.zh_display_name || creator.display_name || order.created_by || "",
            };
          }).sort((a, b) => (a.shipped_date || "9999-12-31").localeCompare(b.shipped_date || "9999-12-31") || (a.order_no || "").localeCompare(b.order_no || "") || Number(a.line_no || 0) - Number(b.line_no || 0));

          updateSalesOrderFilterOptions();
          renderSalesOrderRows();
        } catch (error) {
          setFeatureMessage(error.message, true);
          const tbody = document.getElementById("salesOrderTableBody");
          if (tbody) tbody.innerHTML = `<tr><td colspan="16">${escapeHtml(error.message)}</td></tr>`;
        }
      }
