      function renderSalesOrderRows() {
        const tbody = document.getElementById("salesOrderTableBody");
        if (!tbody) return;

        const filters = {
          orderNo: document.getElementById("soNoFilter")?.value || "",
          customer: document.getElementById("soCustomerFilter")?.value || "",
          product: document.getElementById("soProductFilter")?.value || "",
          status: document.getElementById("soStatusFilter")?.value || "",
          shippedFrom: document.getElementById("soShippedFromFilter")?.value || "",
          shippedTo: document.getElementById("soShippedToFilter")?.value || "",
          createdFrom: document.getElementById("soCreatedFromFilter")?.value || "",
          createdTo: document.getElementById("soCreatedToFilter")?.value || "",
        };

        const filtered = salesOrderRows.filter((row) => {
          if (!includesText(row.order_no, filters.orderNo)) return false;
          if (!includesText(row.customer_name, filters.customer)) return false;
          if (!includesText(row.product_sku, filters.product)) return false;
          if (filters.status && normalizeSalesStatus(row.status) !== filters.status) return false;
          if (filters.shippedFrom && row.shipped_date < filters.shippedFrom) return false;
          if (filters.shippedTo && row.shipped_date > filters.shippedTo) return false;
          const createdDate = String(row.created_at || "").slice(0, 10);
          if (filters.createdFrom && createdDate < filters.createdFrom) return false;
          if (filters.createdTo && createdDate > filters.createdTo) return false;
          return true;
        });

        tbody.innerHTML = filtered.map((row) => {
          const shippedDateClass = row.is_shipped_complete === true ? "" : dueDateUrgency(row.shipped_date);
          return `

      async function loadSalesOrderDetail(orderId) {
        const client = getClient();
        const { data: order, error: orderError } = await client
          .from("sales_orders")
          .select("id,order_no,customer_id,status,order_date,subtotal_amount,discount_amount,total_amount,payment_method,note,created_by,created_at,updated_at")
          .eq("id", orderId)
          .maybeSingle();
        if (orderError) throw orderError;
        if (!order) return null;

        const [{ data: customer }, { data: items, error: itemsError }] = await Promise.all([
          order.customer_id
            ? client.from("customers").select("id,name,zh_name").eq("id", order.customer_id).maybeSingle()
            : Promise.resolve({ data: null }),
          client
            .from("sales_order_items")
            .select("id,product_id,quantity,shipped_quantity,is_shipped_complete,unit_price,discount_amount,line_amount,shipped_date,products(id,sku,name,zh_name,unit)")
            .eq("sales_order_id", orderId),
        ]);
        if (itemsError) throw itemsError;

        const lines = (items || []).map((line) => ({
          id: line.id,
          product_id: line.product_id,
          sku: line.products?.sku || "",
          name: line.products?.name || "",
          zh_name: line.products?.zh_name || "",
          unit: line.products?.unit || "",
          quantity: Number(line.quantity || 0),
          shipped_quantity: Number(line.shipped_quantity || 0),
          is_shipped_complete: line.is_shipped_complete === true,
          unit_price: Number(line.unit_price || 0),
          discount_amount: Number(line.discount_amount || 0),
          line_amount: Number(line.line_amount || 0),
          shipped_date: line.shipped_date || "",
        }));

        return {
          ...order,
          status: normalizeSalesStatus(order.status),
          order_date_text: String(order.order_date || "").slice(0, 10),
          customer_name: customer?.zh_name || customer?.name || order.customer_id || "",
          lines,
        };
      }

        return Boolean(order?.lines?.length) && order.lines.every((line) => line.is_shipped_complete === true);

        return normalizeSalesStatus(currentSalesOrder?.status) === "cancelled"
          || normalizeSalesStatus(line.status) === "cancelled"

      async function confirmSalesOrderShipment(itemId) {
        try {
          const row = salesOrderRows.find((item) => item.item_id === itemId);
          if (!row) return;
          const shipmentQuantity = Number(document.getElementById("soShipmentQuantity")?.value || 0);
          if (shipmentQuantity <= 0) throw new Error(t("salesShipmentNeedQuantity"));
          const nextShippedQuantity = Number((Number(row.shipped_quantity || 0) + shipmentQuantity).toFixed(3));
          if (nextShippedQuantity > Number(row.quantity || 0)) throw new Error(t("salesShipmentQuantityTooLarge"));

          const client = getClient();
          const { data: sessionData, error: sessionError } = await client.auth.getSession();
          if (sessionError) throw sessionError;
          const { data: inventoryData, error: inventoryError } = await client
            .from("inventory")
            .select("product_id,quantity")
            .eq("product_id", row.product_id)
            .maybeSingle();
          if (inventoryError) throw inventoryError;

          const currentQuantity = Number(inventoryData?.quantity || 0);
          if (currentQuantity < shipmentQuantity) {
            throw new Error(t("posInsufficientStock", {
              sku: row.product_sku || row.product_id,
              stock: money(currentQuantity),
              quantity: money(shipmentQuantity),
            }));
          }

          const today = todayText();
          const isComplete = nextShippedQuantity >= Number(row.quantity || 0);
          const { error: itemError } = await client
            .from("sales_order_items")
            .update({
              shipped_quantity: nextShippedQuantity,
              is_shipped_complete: isComplete,
            })
            .eq("id", row.item_id);
          if (itemError) throw itemError;

          const quantityAfter = Number((currentQuantity - shipmentQuantity).toFixed(3));
          const { error: inventoryUpdateError } = await client
            .from("inventory")
            .update({ quantity: quantityAfter, last_movement_at: new Date().toISOString() })
            .eq("product_id", row.product_id);
          if (inventoryUpdateError) throw inventoryUpdateError;

          const { error: movementError } = await client.from("stock_movements").insert({
            product_id: row.product_id,
            movement_type: "601",
            quantity_change: -shipmentQuantity,
            quantity_after: quantityAfter,
            reference_type: "sales_order",
            reference_id: row.sales_order_id,
            reference_item_id: row.item_id,
            reference_order_no: row.order_no,
            reference_line_no: row.line_no,
            note: null,
            created_by: sessionData.session?.user?.id || null,
          });
          if (movementError) throw movementError;

          window.alert(t("salesShipmentSaved"));
          row.shipped_quantity = nextShippedQuantity;
          row.is_shipped_complete = isComplete;
          await loadSalesOrders();
          renderSalesOrdersFeature();
          setFeatureMessage(t("salesShipmentSaved"));
          refreshDashboardMetrics();
        } catch (error) {
          setFeatureMessage(error.message, true);
        }
      }

      function renderSalesOrderLineRows() {
        const tbody = document.getElementById("soLineTableBody");
        if (!tbody) return;
        tbody.innerHTML = salesOrderLines.map((line, index) => {
          const gross = Number(line.quantity || 0) * Number(line.unit_price || 0);
          line.line_amount = Number(Math.max(0, gross - Number(line.discount_amount || 0)).toFixed(2));
          const lineReadonly = salesOrderFormReadonly || isSalesOrderLineLocked(line);
          const shippedQuantity = Number(line.shipped_quantity || 0);
          const minimumQuantity = Number(Math.max(0.001, shippedQuantity).toFixed(3));
          line.is_shipped_complete = shippedQuantity > 0 && Number(line.quantity || 0) <= shippedQuantity ? true : line.is_shipped_complete === true;
          const productCell = lineReadonly
            ? escapeHtml(line.sku)
            : `<div class="lookup-line">
                  <input data-so-line-sku="${index}" list="soProductOptions${index}" value="${escapeHtml(line.sku)}">
                  <button class="tool-btn lookup-btn" type="button" data-so-product-lookup="${index}" title="${t("lookup")}" aria-label="${t("lookup")}">${t("lookup")}</button>
                  <datalist id="soProductOptions${index}"></datalist>
                </div>`;
          return `
            <tr data-so-line="${index}">
              <td>${productCell}</td>
              <td>${escapeHtml(line.zh_name || line.name)}</td>
              <td>${escapeHtml(line.unit)}</td>
              <td>${lineReadonly ? escapeHtml(line.quantity) : `<input data-so-line-qty="${index}" type="number" min="${escapeHtml(minimumQuantity)}" step="0.001" value="${escapeHtml(line.quantity)}">`}</td>
              <td>${escapeHtml(shippedQuantity)}</td>
              <td>${lineReadonly ? escapeHtml(line.shipped_date || "") : `<input data-so-line-shipped-date="${index}" type="date" value="${escapeHtml(line.shipped_date || "")}" required>`}</td>
              <td>${lineReadonly ? money(line.unit_price) : `<input data-so-line-price="${index}" type="number" min="0" step="0.01" value="${escapeHtml(line.unit_price)}">`}</td>
              <td>${lineReadonly ? money(line.discount_amount || 0) : `<input data-so-line-discount="${index}" type="number" min="0" step="0.01" value="${escapeHtml(line.discount_amount || 0)}">`}</td>
              <td>${money(line.line_amount)}</td>
              <td>${escapeHtml(booleanLabel(line.is_shipped_complete === true))}</td>
              <td>${lineReadonly || shippedQuantity > 0 ? "" : `<button class="tool-btn" type="button" data-so-remove-line="${index}">${t("remove")}</button>`}</td>
            </tr>
          `;
        }).join("");

        tbody.querySelectorAll("[data-so-product-lookup]").forEach((button) => {
          button.addEventListener("click", () => lookupSalesProduct(Number(button.dataset.soProductLookup)));
        });
        tbody.querySelectorAll("[data-so-line-sku]").forEach((input) => {
          input.addEventListener("change", () => applySalesProductLookupValue(Number(input.dataset.soLineSku)));
        });
        tbody.querySelectorAll("[data-so-line-qty]").forEach((input) => {
          input.addEventListener("input", () => updateSalesLineNumber(Number(input.dataset.soLineQty), "quantity", input.value));
        });
        tbody.querySelectorAll("[data-so-line-price]").forEach((input) => {
          input.addEventListener("input", () => updateSalesLineNumber(Number(input.dataset.soLinePrice), "unit_price", input.value));
        });
        tbody.querySelectorAll("[data-so-line-discount]").forEach((input) => {
          input.addEventListener("input", () => updateSalesLineNumber(Number(input.dataset.soLineDiscount), "discount_amount", input.value));
        });
        tbody.querySelectorAll("[data-so-line-shipped-date]").forEach((input) => {
          input.addEventListener("input", () => {
            salesOrderLines[Number(input.dataset.soLineShippedDate)].shipped_date = input.value;
          });
        });
        tbody.querySelectorAll("[data-so-remove-line]").forEach((button) => {
          button.addEventListener("click", () => {
            salesOrderLines.splice(Number(button.dataset.soRemoveLine), 1);
            if (!salesOrderLines.length) salesOrderLines.push(blankSalesOrderLine());
            renderSalesOrderLineRows();
          });
        });
        updateSalesOrderTotal();
      }

      function updateSalesLineNumber(index, field, value) {
        salesOrderLines[index][field] = Number(value || 0);
        renderSalesOrderLineRows();
      }

      function updateSalesOrderTotal() {
        const subtotal = salesOrderLines.reduce((sum, line) => sum + Number(line.quantity || 0) * Number(line.unit_price || 0), 0);
        const lineTotal = salesOrderLines.reduce((sum, line) => sum + Number(line.line_amount || 0), 0);
        const orderDiscount = Number(document.getElementById("soFormDiscount")?.value || 0);
        const total = Math.max(0, lineTotal - orderDiscount);
        const subtotalElement = document.getElementById("soFormSubtotal");
        const totalElement = document.getElementById("soFormTotal");
        if (subtotalElement) subtotalElement.textContent = money(subtotal);
        if (totalElement) totalElement.textContent = money(total);
        return { subtotal: Number(subtotal.toFixed(2)), total: Number(total.toFixed(2)), orderDiscount: Number(orderDiscount.toFixed(2)) };
      }

      function setSalesCustomerOptions(items) {
        const datalist = document.getElementById("soCustomerOptions");
        if (!datalist) return;
        datalist.innerHTML = items.map((item) => `<option value="${escapeHtml(item.zh_name || item.name)}" data-id="${escapeHtml(item.id)}">${escapeHtml(item.name || item.zh_name)}</option>`).join("");
      }

      async function lookupSalesCustomer() {
        const input = document.getElementById("soCustomerLookup");
        const term = input.value.trim();
        const query = getClient()
          .from("customers")
          .select("id,name,zh_name,phone,is_active")
          .eq("is_active", true)
          .limit(20);
        const result = term
          ? await query.or(`name.ilike.%${term}%,zh_name.ilike.%${term}%,phone.ilike.%${term}%`)
          : await query;
        if (result.error) {
          setFeatureMessage(result.error.message, true);
          return;
        }
        if (!result.data?.length) {
          setFeatureMessage(t("salesOrderNoCustomer"), true);
          return;
        }
        setSalesCustomerOptions(result.data);
        if (result.data.length === 1) {
          const customer = result.data[0];
          document.getElementById("soCustomerId").value = customer.id;
          input.value = customer.zh_name || customer.name;
          setFeatureMessage(t("salesOrderCustomerSelected"));
        }
      }

      function applySalesCustomerLookupValue() {
        const input = document.getElementById("soCustomerLookup");
        const options = document.getElementById("soCustomerOptions")?.options || [];
        const option = [...options].find((item) => item.value === input.value);
        if (option) document.getElementById("soCustomerId").value = option.dataset.id || "";
      }

      function setSalesProductOptions(index, items) {
        const datalist = document.getElementById(`soProductOptions${index}`);
        if (!datalist) return;
        datalist.innerHTML = items.map((item) => `<option value="${escapeHtml(item.sku)}">${escapeHtml(item.zh_name || item.name || item.barcode || "")}</option>`).join("");
      }

      async function lookupSalesProduct(index) {
        const input = document.querySelector(`[data-so-line-sku="${index}"]`);
        const term = input.value.trim();
        const query = getClient()
          .from("products")
          .select("id,sku,barcode,name,zh_name,unit,sale_price,is_active")
          .eq("is_active", true)
          .limit(20);
        const result = term
          ? await query.or(`sku.ilike.%${term}%,barcode.ilike.%${term}%,name.ilike.%${term}%,zh_name.ilike.%${term}%`)
          : await query;
        if (result.error) {
          setFeatureMessage(result.error.message, true);
          return;
        }
        if (!result.data?.length) {
          setFeatureMessage(t("salesOrderNoProduct"), true);
          return;
        }
        setSalesProductOptions(index, result.data);
        const exact = result.data.find((item) => item.sku === term || item.barcode === term) || (result.data.length === 1 ? result.data[0] : null);
        if (exact) selectSalesProduct(index, exact);
      }

      async function applySalesProductLookupValue(index) {
        const sku = document.querySelector(`[data-so-line-sku="${index}"]`)?.value.trim();
        if (!sku) return;
        const { data, error } = await getClient()
          .from("products")
          .select("id,sku,barcode,name,zh_name,unit,sale_price,is_active")
          .eq("sku", sku)
          .maybeSingle();
        if (error) {
          setFeatureMessage(error.message, true);
          return;
        }
        if (data) selectSalesProduct(index, data);
      }

      function selectSalesProduct(index, product) {
        salesOrderLines[index] = {
          ...salesOrderLines[index],
          product_id: product.id,
          sku: product.sku,
          name: product.name || "",
          zh_name: product.zh_name || "",
          unit: product.unit || "pcs",
          unit_price: Number(product.sale_price || 0),
        };
        salesOrderLines[index].line_amount = Number(Math.max(0, Number(salesOrderLines[index].quantity || 0) * Number(salesOrderLines[index].unit_price || 0) - Number(salesOrderLines[index].discount_amount || 0)).toFixed(2));
        setFeatureMessage(t("salesOrderProductSelected"));
        renderSalesOrderLineRows();
      }

      async function generateSalesOrderNo() {
        const today = new Date().toISOString().slice(0, 10).replaceAll("-", "");
        const prefix = `SO${today}`;
        const { data, error } = await getClient()
          .from("sales_orders")
          .select("order_no")
          .ilike("order_no", `${prefix}%`)
          .order("order_no", { ascending: false })
          .limit(1);
        if (error) throw error;
        const lastNo = data?.[0]?.order_no || "";
        const lastSeq = Number(lastNo.slice(prefix.length)) || 0;
        return `${prefix}${String(lastSeq + 1).padStart(3, "0")}`;
      }

      async function saveSalesOrder(status) {
        try {
          applySalesCustomerLookupValue();
          const validLines = salesOrderLines
            .filter((line) => line.product_id && Number(line.quantity) > 0 && line.shipped_date)
            .map((line) => {
              const shippedQuantity = Number(line.shipped_quantity || 0);
              const quantity = Number(line.quantity);
              if (quantity < shippedQuantity) throw new Error(t("salesOrderQuantityBelowShipped"));
              const gross = Number(line.quantity || 0) * Number(line.unit_price || 0);
              const lineDiscount = Number(line.discount_amount || 0);
              return {
                id: line.id || null,
                locked: isSalesOrderLineLocked(line),
                product_id: line.product_id,
                quantity,
                shipped_quantity: shippedQuantity,
                is_shipped_complete: shippedQuantity > 0 && quantity <= shippedQuantity ? true : line.is_shipped_complete === true,
                unit_price: Number(line.unit_price || 0),
                discount_amount: Number(lineDiscount.toFixed(2)),
                line_amount: Number(Math.max(0, gross - lineDiscount).toFixed(2)),
                shipped_date: line.shipped_date,
              };
            });
          const hasIncompleteLine = salesOrderLines.some((line) => line.product_id || Number(line.quantity) > 0 || line.shipped_date)
            && salesOrderLines.some((line) => !line.product_id || Number(line.quantity) <= 0 || !line.shipped_date);
          if (!validLines.length || hasIncompleteLine) throw new Error(t("salesOrderNeedProduct"));
          const keptLineIds = validLines.filter((line) => line.id).map((line) => line.id);
          const removedShippedLine = (currentSalesOrder?.lines || [])
            .some((line) => line.id && Number(line.shipped_quantity || 0) > 0 && !keptLineIds.includes(line.id));
          if (removedShippedLine) throw new Error(t("salesOrderQuantityBelowShipped"));
          if (status === "confirmed" && !window.confirm(t("salesOrderConfirmSave"))) return;

          const client = getClient();
          const { data: sessionData, error: sessionError } = await client.auth.getSession();
          if (sessionError) throw sessionError;
          const orderNo = currentSalesOrder?.order_no || await generateSalesOrderNo();
          const subtotalAmount = validLines.reduce((sum, line) => sum + Number(line.quantity || 0) * Number(line.unit_price || 0), 0);
          const lineTotal = validLines.reduce((sum, line) => sum + line.line_amount, 0);
          const orderDiscount = Number(document.getElementById("soFormDiscount").value || 0);
          const payload = {
            order_no: orderNo,
            customer_id: document.getElementById("soCustomerId").value || null,
            status,
            order_date: document.getElementById("soFormDate").value || new Date().toISOString().slice(0, 10),
            subtotal_amount: Number(subtotalAmount.toFixed(2)),
            discount_amount: Number(orderDiscount.toFixed(2)),
            total_amount: Number(Math.max(0, lineTotal - orderDiscount).toFixed(2)),
            payment_method: document.getElementById("soFormPayment").value.trim() || null,
            note: document.getElementById("soFormNote").value.trim() || null,
            created_by: currentSalesOrder?.created_by || sessionData.session?.user?.id || null,
          };

          let orderId = currentSalesOrder?.id;
          if (orderId) {
            const { error } = await client.from("sales_orders").update(payload).eq("id", orderId);
            if (error) throw error;
          } else {
            const { data, error } = await client.from("sales_orders").insert(payload).select("id,order_no").single();
            if (error) throw error;
            orderId = data.id;
            payload.order_no = data.order_no;
          }

          if (currentSalesOrder?.id) {
            const removableLineIds = (currentSalesOrder.lines || [])
              .filter((line) => line.id && !isSalesOrderLineLocked(line) && Number(line.shipped_quantity || 0) <= 0 && !keptLineIds.includes(line.id))
              .map((line) => line.id);
            if (removableLineIds.length) {
              const deleteResult = await client.from("sales_order_items").delete().in("id", removableLineIds);
              if (deleteResult.error) throw deleteResult.error;
            }

            for (const line of validLines) {
              const itemPayload = {
                product_id: line.product_id,
                quantity: line.quantity,
                shipped_quantity: line.shipped_quantity,
                is_shipped_complete: line.is_shipped_complete,
                unit_price: line.unit_price,
                discount_amount: line.discount_amount,
                line_amount: line.line_amount,
                shipped_date: line.shipped_date,
                sales_order_id: orderId,
              };
              if (line.id) {
                if (!line.locked) {
                  const updateResult = await client.from("sales_order_items").update(itemPayload).eq("id", line.id);
                  if (updateResult.error) throw updateResult.error;
                }
              } else {
                const insertResult = await client.from("sales_order_items").insert(itemPayload);
                if (insertResult.error) throw insertResult.error;
              }
            }
          } else {
            const insertResult = await client.from("sales_order_items").insert(validLines.map((line) => ({
              product_id: line.product_id,
              quantity: line.quantity,
              shipped_quantity: line.shipped_quantity,
              is_shipped_complete: line.is_shipped_complete,
              unit_price: line.unit_price,
              discount_amount: line.discount_amount,
              line_amount: line.line_amount,
              shipped_date: line.shipped_date,
              sales_order_id: orderId,
            })));
            if (insertResult.error) throw insertResult.error;
          }
          currentSalesOrder = await loadSalesOrderDetail(orderId) || { id: orderId, ...payload };
          salesOrderLines = currentSalesOrder.lines?.length ? currentSalesOrder.lines.map((line) => ({ ...line })) : salesOrderLines;
          document.getElementById("soFormNo").value = payload.order_no;
          setFeatureMessage(status === "draft" ? t("salesOrderSavedDraft") : t("salesOrderSavedConfirmed"));
          await loadSalesOrders();
          if (status === "draft") setFeatureMessage(t("salesOrderSavedDraft"));
          if (status === "confirmed") renderSalesOrdersFeature();
        } catch (error) {
          setFeatureMessage(error.message, true);
        }
      }

      }

      function inventoryStatus(row) {
        if (row.is_active === false) return "停用";
        const quantity = Number(row.quantity || 0);
        const openPurchaseOrderQuantity = Number(row.open_purchase_order_quantity || 0);
        const minStock = Number(row.min_stock || 0);
        if (quantity < minStock) {
          return quantity + openPurchaseOrderQuantity - minStock >= 0 ? "已订" : "低库存";
        }
        if (quantity === 0) return "缺货";
        return "正常";
      }

      function isInventoryBelowMin(row) {
        return Number(row.quantity || 0) < Number(row.min_stock || 0);
      }

      function movementDate(value) {
        if (!value) return "";
        return String(value).slice(0, 10);
      }

      async function loadInventory() {
        try {
          setFeatureMessage(t("loadingInventory"));
          const client = getClient();
          const [{ data: productsData, error: productsError }, { data: inventoryData, error: inventoryError }] = await Promise.all([
            client
              .from("products")
              .select("id,sku,barcode,name,zh_name,category,specification,unit,sale_price,min_stock,default_order_quantity,is_active")
              .order("sku", { ascending: true })
              .limit(1000),
            client
              .from("inventory")
              .select("product_id,quantity,last_movement_at")
              .limit(1000),
          ]);

          if (productsError) throw productsError;
          if (inventoryError) throw inventoryError;

          const pendingPurchaseItems = await loadActivePurchaseItemRows(client, { details: true, includeHistory: false, limit: 1000 });
          const openPurchaseOrderQuantityByProduct = new Map();
          (pendingPurchaseItems || [])
            .filter((item) => item.purchase_orders?.status === "confirmed")
            .forEach((item) => {
              const pendingQuantity = Math.max(0, Number(item.quantity || 0) - Number(item.received_quantity || 0));
              if (!pendingQuantity) return;
              openPurchaseOrderQuantityByProduct.set(
                item.product_id,
                Number(((openPurchaseOrderQuantityByProduct.get(item.product_id) || 0) + pendingQuantity).toFixed(3))
              );
            });

          const stockByProduct = new Map((inventoryData || []).map((item) => [item.product_id, item]));
          inventoryRows = (productsData || []).map((product) => {
            const stock = stockByProduct.get(product.id) || { quantity: 0, last_movement_at: "" };
            const row = {
              ...product,
              quantity: Number(stock.quantity || 0),
              open_purchase_order_quantity: Number(openPurchaseOrderQuantityByProduct.get(product.id) || 0),
              last_movement_at: stock.last_movement_at || "",
            };
            return { ...row, status: inventoryStatus(row) };
          }).sort((a, b) => {
            const aBelowMin = isInventoryBelowMin(a) ? 0 : 1;
            const bBelowMin = isInventoryBelowMin(b) ? 0 : 1;
            return aBelowMin - bBelowMin || String(a.sku || "").localeCompare(String(b.sku || ""));
          });

          renderInventoryRows();
        } catch (error) {
          setFeatureMessage(error.message, true);
          const tbody = document.getElementById("inventoryTableBody");
          if (tbody) tbody.innerHTML = `<tr><td colspan="15">${escapeHtml(error.message)}</td></tr>`;
        }
      }

          if (filters.minQty !== "" && Number(row.quantity || 0) < Number(filters.minQty)) return false;

      async function openPurchaseOrderFromInventory(productId) {
        if (!["owner", "manager"].includes(activeRole)) return;
        const row = inventoryRows.find((item) => item.id === productId);
        if (!row) return;

        let costPrice = 0;
        try {
          const { data, error } = await getClient()
            .from("products")
            .select("cost_price,default_order_quantity")
            .eq("id", productId)
            .maybeSingle();
          if (error) throw error;
          costPrice = Number(data?.cost_price || 0);
          if (data?.default_order_quantity) row.default_order_quantity = Number(data.default_order_quantity);
        } catch (error) {
          costPrice = 0;
        }

        const defaultOrderQuantity = Number(row.default_order_quantity || 0);
        const shortageQuantity = Number(row.min_stock || 0) - Number(row.quantity || 0) - Number(row.open_purchase_order_quantity || 0);
        const suggestedQuantity = Number((defaultOrderQuantity > 0 ? defaultOrderQuantity : Math.max(0, shortageQuantity)).toFixed(3));
        renderPurchaseOrderForm(null, { readonly: false });
        purchaseOrderLines = [{
          ...blankPurchaseOrderLine(),
          product_id: row.id,
          sku: row.sku || "",
          name: row.name || "",
          zh_name: row.zh_name || "",
          unit: row.unit || "pcs",
          quantity: suggestedQuantity,
          unit_cost: costPrice,
          line_amount: Number((suggestedQuantity * costPrice).toFixed(2)),
        }];
        renderPurchaseOrderLineRows();
        setFeatureMessage(t("inventoryOrderStarted"));
      }

      async function saveUser() {
        try {
          const id = formValue("user_id");
          const payload = {
            display_name: formValue("display_name"),
            zh_display_name: formValue("zh_display_name") || null,
            phone: formValue("phone") || null,
            role: formValue("role") || "cashier",
            is_active: formValue("user_is_active") === "true",
          };

          if (!id || !payload.display_name) {
            throw new Error(t("userRequired"));
          }

          const existing = userRows.some((row) => row.id === id);
          const result = existing
            ? await getClient().from("users").update(payload).eq("id", id)
            : await getClient().from("users").insert({ id, ...payload });

          if (result.error) throw result.error;
          hideUserForm();
          await loadUsers();
          setFeatureMessage(t("userSaved"));
        } catch (error) {
          setFeatureMessage(error.message, true);
        }
      }

      async function toggleUser(id) {
        try {
          const item = userRows.find((row) => row.id === id);
          if (!item) return;
          const { error } = await getClient().from("users").update({ is_active: !item.is_active }).eq("id", id);
          if (error) throw error;
          await loadUsers();
          setFeatureMessage(item.is_active ? t("userDisabled") : t("userEnabled"));
        } catch (error) {
          setFeatureMessage(error.message, true);
        }
      }

        if (!tile?.dataset.action) return;
        event.preventDefault();
        openFeature(tile.dataset.action);
      });
    })();

        },
      });

      loginForm.dataset.authReady = "true";
      window.xmbSupabaseClient = supabaseClient;
      window.xmbHandleBrowserBack = async () => {
        if (!document.body.classList.contains("is-authenticated")) return;
        await supabaseClient.auth.signOut().catch(() => null);
        exitToLogin(t("signInAgain"));
      };

      async function loadCurrentProfile() {
        const { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();
        if (sessionError) throw sessionError;

        const user = sessionData.session?.user;
        if (!user) return null;

        const { data: profile, error: profileError } = await supabaseClient
          .from("users")
          .select("id,display_name,zh_display_name,role,is_active")
          .eq("id", user.id)
          .maybeSingle();

        if (profileError) throw profileError;
        if (!profile) throw new Error(t("missingProfile"));
        if (!profile.is_active) throw new Error(t("inactiveAccount"));

        return profile;
      }

      function renderProfile(profile) {
        renderLaunchpad(profile.role);
        const displayName = profile.zh_display_name || profile.display_name || profile.role;
        document.getElementById("userChip").textContent = t("userChip", { name: displayName, role: profile.role });
        document.getElementById("welcomeText").textContent = t("welcomeUser", { name: displayName });
      }

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        event.stopImmediatePropagation();

        setLoginMessage(t("signingIn"));
        const loginAccount = accountInput.value;
        const loginPassword = passwordInput.value;
        clearLoginCredentials();

        const { error } = await supabaseClient.auth.signInWithPassword({
          email: normalizeLoginId(loginAccount),
          password: loginPassword,
        });

        if (error) {
          setLoginMessage(t("loginFailed", { message: error.message }));
          return;
        }

        try {
          const profile = await loadCurrentProfile();
          finishAuthCheck();
          renderProfile(profile);
          clearLoginCredentials();
          setLoginMessage(t("loginSucceeded"));
        } catch (profileError) {
          finishAuthCheck();
          setLoginMessage(t("profileFailed", { message: profileError.message }));
        }
      }, true);

      logoutButton.addEventListener("click", async () => {
        await supabaseClient.auth.signOut();
        finishAuthCheck();
        exitToLogin();
        setLoginMessage(t("signedOut"));
      });

      supabaseClient.auth.signOut()
        .catch(() => null)
        .finally(() => {
          finishAuthCheck();
          exitToLogin();
          setLoginMessage(t("signInAgain"));
        });
    })();
  </script>
</body>
</html>
