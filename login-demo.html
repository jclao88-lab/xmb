<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小店进存销管理系统 - 登录</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #15202b;
      --muted: #667085;
      --line: #d7dde5;
      --brand: #176b5b;
      --brand-dark: #105346;
      --panel: rgba(255, 255, 255, 0.94);
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--ink);
      background: #111827;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 470px);
      align-items: center;
      gap: 48px;
      padding: 48px clamp(28px, 6vw, 86px);
      background:
        linear-gradient(90deg, rgba(12, 18, 24, 0.72) 0%, rgba(12, 18, 24, 0.38) 45%, rgba(12, 18, 24, 0.18) 100%),
        url("assets/shop-background.png") center / cover no-repeat;
    }

    .brand {
      max-width: 640px;
      color: #fff;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.32);
    }

    .eyebrow {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
      color: rgba(255, 255, 255, 0.78);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 800;
    }

    .brand p {
      margin: 18px 0 0;
      max-width: 520px;
      font-size: 18px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.86);
    }

    .login-panel {
      width: 100%;
      padding: 34px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .panel-head {
      margin-bottom: 26px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .panel-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
      color: #344054;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    input:focus,
    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(23, 107, 91, 0.16);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 2px 0 22px;
      font-size: 14px;
      color: var(--muted);
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .remember input {
      width: 16px;
      min-height: 16px;
      padding: 0;
      accent-color: var(--brand);
    }

    a {
      color: var(--brand-dark);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 6px;
      background: var(--brand);
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease;
    }

    button:hover {
      background: var(--brand-dark);
    }

    button:active {
      transform: translateY(1px);
    }

    .status {
      min-height: 20px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      .page {
        grid-template-columns: 1fr;
        align-content: center;
        gap: 28px;
        padding: 28px 18px;
        background:
          linear-gradient(180deg, rgba(12, 18, 24, 0.72) 0%, rgba(12, 18, 24, 0.38) 54%, rgba(12, 18, 24, 0.2) 100%),
          url("assets/shop-background.png") center / cover no-repeat;
      }

      .brand {
        max-width: none;
      }

      .brand p {
        font-size: 15px;
      }

      .login-panel {
        padding: 24px;
      }
    }

    @media (max-width: 420px) {
      .row {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="brand" aria-label="系统信息">
      <p class="eyebrow" data-i18n="eyebrow">街边小店日常经营</p>
      <h1 data-i18n="appTitle">小店进存销管理系统</h1>
      <p data-i18n="appIntro">商品、进货、销售、库存集中管理，适合便利店、杂货铺和社区小超市第一版上线使用。</p>
    </section>

    <section class="login-panel" aria-label="登录表单">
      <div class="panel-head">
        <h2 data-i18n="loginTitle">登录系统</h2>
        <p data-i18n="loginIntro">使用 Supabase Auth 账号进入工作台</p>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label for="languageSelect" data-i18n="languageLabel">语言</label>
          <select id="languageSelect" name="language">
            <option value="zh-CN">中文</option>
            <option value="en">English</option>
          </select>
        </div>

        <div class="field">
          <label for="account" data-i18n="accountLabel">账号(xmb.com)</label>
          <input id="account" name="account" type="text" autocomplete="off" placeholder="owner" required />
        </div>

        <div class="field">
          <label for="password" data-i18n="passwordLabel">密码</label>
          <input id="password" name="password" type="password" autocomplete="new-password" placeholder="输入密码" data-i18n-placeholder="passwordPlaceholder" required />
        </div>

        <div class="row">
          <label class="remember">
            <input type="checkbox" name="remember" />
            <span data-i18n="rememberLogin">记住登录状态</span>
          </label>
          <a href="#" data-i18n="forgotPassword">忘记密码</a>
        </div>

        <button type="submit" data-i18n="loginButton">登录</button>
        <p class="status" id="status" data-i18n="demoStatus">演示页面未连接真实 Supabase 项目。</p>
      </form>
    </section>
  </main>

  <script>
    const i18nMessages = {
      "zh-CN": {
        eyebrow: "街边小店日常经营",
        appTitle: "小店进存销管理系统",
        appIntro: "商品、进货、销售、库存集中管理，适合便利店、杂货铺和社区小超市第一版上线使用。",
        loginTitle: "登录系统",
        loginIntro: "使用 Supabase Auth 账号进入工作台",
        languageLabel: "语言",
        accountLabel: "账号(xmb.com)",
        passwordLabel: "密码",
        passwordPlaceholder: "输入密码",
        rememberLogin: "记住登录状态",
        forgotPassword: "忘记密码",
        loginButton: "登录",
        demoStatus: "演示页面未连接真实 Supabase 项目。",
        loginTriggered: "登录动作已触发，实际登录 ID：{loginId}",
      },
      en: {
        eyebrow: "Daily store operations",
        appTitle: "Small Store Inventory and Sales",
        appIntro: "Manage products, purchasing, sales, and stock in one place for the first version of a convenience or neighborhood store system.",
        loginTitle: "Sign In",
        loginIntro: "Use a Supabase Auth account to enter the workspace",
        languageLabel: "Language",
        accountLabel: "Account (xmb.com)",
        passwordLabel: "Password",
        passwordPlaceholder: "Enter password",
        rememberLogin: "Remember sign-in",
        forgotPassword: "Forgot password",
        loginButton: "Sign In",
        demoStatus: "Demo page is not connected to a real Supabase project.",
        loginTriggered: "Sign-in action triggered. Actual login ID: {loginId}",
      },
    };

    function detectDefaultLanguage() {
      const languages = navigator.languages?.length ? navigator.languages : [navigator.language || ""];
      const hasChinese = languages.some((language) => language.toLowerCase().startsWith("zh"));
      return hasChinese ? "zh-CN" : "en";
    }

    let currentLanguage = localStorage.getItem("xmbLanguage") || detectDefaultLanguage();

    function t(key, values = {}) {
      let text = i18nMessages[currentLanguage]?.[key] || i18nMessages["zh-CN"][key] || key;
      Object.entries(values).forEach(([name, value]) => {
        text = text.replaceAll(`{${name}}`, value);
      });
      return text;
    }

    function applyLanguage(language) {
      currentLanguage = i18nMessages[language] ? language : "zh-CN";
      localStorage.setItem("xmbLanguage", currentLanguage);
      document.documentElement.lang = currentLanguage;
      document.querySelectorAll("[data-i18n]").forEach((element) => {
        element.textContent = t(element.dataset.i18n);
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach((element) => {
        element.placeholder = t(element.dataset.i18nPlaceholder);
      });
      document.getElementById("languageSelect").value = currentLanguage;
    }

    document.getElementById("languageSelect").addEventListener("change", (event) => {
      applyLanguage(event.target.value);
    });
    applyLanguage(currentLanguage);
    document.getElementById("account").value = "";
    document.getElementById("password").value = "";

    document.getElementById("loginForm").addEventListener("submit", function (event) {
      event.preventDefault();
      const accountInput = document.getElementById("account");
      const passwordInput = document.getElementById("password");
      const account = accountInput.value.trim();
      const loginId = account.includes("@") ? account : `${account}@xmb.com`;
      accountInput.value = "";
      passwordInput.value = "";
      document.getElementById("status").textContent = t("loginTriggered", { loginId });
    });
  </script>
</body>
</html>
